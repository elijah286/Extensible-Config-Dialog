<!DOCTYPE html>
<!--
  .github/pages/vi-interactive.html
  Standalone interactive VI viewer — renders a single exported VI snapshot
  HTML inline. Accepts ?file=<relative-path-to-html> query parameter.

  Used by the VI Browser for direct-link sharing of individual VI snapshots.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VI Viewer — LabVIEW-CI-with-Containers</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;height:100vh}
    #toolbar{padding:8px 14px;background:#161b22;border-bottom:1px solid #30363d;
             display:flex;align-items:center;gap:12px;font-size:.85em;flex-wrap:wrap}
    #toolbar h1{font-size:1em;font-weight:600}
    #toolbar a{color:#58a6ff;text-decoration:none}#toolbar a:hover{text-decoration:underline}
    #toolbar kbd{font:inherit;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:0 4px}
    #frame-wrap{flex:1;overflow:hidden;position:relative}
    #frame-wrap iframe{width:100%;height:100%;border:none;background:#fff}
    #error{padding:40px;text-align:center;color:#8b949e}
  </style>
</head>
<body>
  <div id="toolbar">
    <h1 id="vi-name">VI Viewer</h1>
    <a href="javascript:history.back()">← Back</a>
    <a id="raw-link" href="#" target="_blank">Open snapshot directly ↗</a>
    <a href="index.html">VI Browser</a>
    <a href="../">CI Dashboard</a>
    <span id="mode-hint" style="margin-left:auto;color:#8b949e;display:none">
      In-place diagram &middot; drag to pan &middot; <kbd>Ctrl</kbd>/<kbd>⌘</kbd>+scroll zoom &middot; <kbd>◀</kbd><kbd>▶</kbd> step a structure's cases
    </span>
  </div>
  <!-- Position-aware in-place renderer (preferred). Filled by LVRender when a
       frames JSON is available. -->
  <div id="frame-wrap">
    <div id="canvas" style="position:absolute;inset:0;display:none"></div>
    <iframe id="viewer" title="VI Snapshot" allowfullscreen></iframe>
  </div>
  <div id="error" style="display:none">
    <p>No VI file specified. Use <code>?frames=path/to/frames.json</code> or <code>?file=path/to/snapshot.html</code></p>
  </div>

  <script src="vi-render.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    // Preferred: a position-aware frames JSON (lvctl `toimages` schema) renders
    // the diagram in place. Legacy: ?file= iframes the flat "Print to HTML" export.
    // ?frames= may be given explicitly, or derived from a ?file= snapshot's sibling
    // <name>.json, so a single link upgrades automatically when the JSON exists.
    const explicitFrames = params.get('frames');
    const file = params.get('file');
    const derivedFrames = file ? file.replace(/\.html$/i, '.json') : null;

    function setName(src) {
      const name = src.split('/').pop().replace(/\.(json|html)$/i, '').replace(/-/g, '/');
      document.getElementById('vi-name').textContent = name;
      document.title = `${name} — VI Viewer`;
    }
    function showError() {
      document.getElementById('frame-wrap').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
    function showIframe(htmlSrc) {
      const src = new URL(htmlSrc, window.location.href).href;
      document.getElementById('canvas').style.display = 'none';
      const vw = document.getElementById('viewer');
      vw.style.display = 'block';
      vw.src = src;
      document.getElementById('raw-link').href = src;
      setName(htmlSrc);
    }
    function showFrames(framesSrc, rawHtmlSrc) {
      const url = new URL(framesSrc, window.location.href).href;
      return fetch(url, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(frames => {
          const canvas = document.getElementById('canvas');
          document.getElementById('viewer').style.display = 'none';
          canvas.style.display = 'block';
          window.LVRender.render(canvas, frames, {});
          document.getElementById('mode-hint').style.display = 'inline';
          document.getElementById('raw-link').href = new URL(rawHtmlSrc || framesSrc, window.location.href).href;
          setName(framesSrc);
          return true;
        });
    }

    if (explicitFrames) {
      showFrames(explicitFrames, file).catch(() => file ? showIframe(file) : showError());
    } else if (file) {
      // Try the position-aware sibling JSON first; fall back to the flat snapshot.
      showFrames(derivedFrames, file).catch(() => showIframe(file));
    } else {
      showError();
    }
  </script>
</body>
</html>
