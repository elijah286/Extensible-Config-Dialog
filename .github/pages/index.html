<!DOCTYPE html>
<!--
  .github/pages/index.html
  Static fallback / placeholder for the CI Dashboard.
  The real dashboard is generated and deployed by dashboard-pages.yml.
  This file is the source template kept in the repo for reference.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CI Dashboard — Extensible-Config-Dialog</title>
  <style>
    :root{
      --bg:#0d1117;--surface:#161b22;--border:#30363d;
      --fg:#e6edf3;--fg-muted:#8b949e;--hover:#1c2128;--link:#58a6ff;
    }
    @media(prefers-color-scheme:light){
      :root{
        --bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;
        --fg:#1f2328;--fg-muted:#57606a;--hover:#f3f4f6;--link:#0969da;
      }
    }
    *{box-sizing:border-box}
    body{margin:0;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--fg);text-align:center}
    h1{font-size:1.5em;margin-bottom:8px}
    p{color:var(--fg-muted)}
    a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
    .links{margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;color:var(--fg);background:var(--surface)}
    .btn:hover{background:var(--hover);border-color:var(--link)}
  </style>
</head>
<body>
  <h1>Extensible-Config-Dialog CI</h1>
  <p>The dashboard is generated by the <code>dashboard-pages.yml</code> workflow.<br>
     Run it manually or wait for the next scheduled refresh.</p>
  <div class="links">
    <a class="btn" href="configure.html" style="background:#1f6feb;color:#fff;border-color:transparent">⚙ Configure Workers</a>
    <a class="btn" href="integrate.html" style="background:#238636;color:#fff;border-color:transparent">➕ Apply to New Repo</a>
    <a class="btn" href="vi-snapshots/">VI Browser</a>
    <a class="btn" href="https://github.com/elijah286/Extensible-Config-Dialog/actions">GitHub Actions</a>
    <a class="btn" href="https://github.com/elijah286/Extensible-Config-Dialog">Repository</a>
  </div>
</body>
</html>
