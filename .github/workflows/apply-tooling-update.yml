# Apply LabVIEW CI update — one-click FULL upgrade target for the dashboard.
#
# The "Update now" button in the What's New dialog (.github/pages/whats-new.html)
# deep-links here. Dispatching this workflow performs a COMPLETE update: it fetches
# the latest tooling from the source repo (.github/labview-ci.yml: source.repo) and
# runs the catalog-driven installer in --update mode, which re-pulls every tooling
# file for this repo's selected activities (bringing new capabilities, not just a
# version bump), rebrands them to this repo, preserves your own config + baked
# dependencies, and bumps the version. The result is opened as a pull request.
# Review + merge to finish — no terminal needed. The config ref bump + vendored
# scripts + pages push with the built-in token, so the version (and thus the
# dashboard + runtime tooling) always adopts token-lessly; only changes to
# .github/workflows/** need a one-time TOOLING_UPDATE_TOKEN (repo + workflow
# scope) and are otherwise deferred. GitHub's own "Run workflow" gate limits this
# to write-access users.
name: Apply LabVIEW CI update

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source ref to pull (blank = the source repo's default branch = latest)"
        required: false
        default: ''
      enable_new_capabilities:
        description: 'Also enable newly published capabilities in this repo'
        type: boolean
        default: true

concurrency:
  group: apply-tooling-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A PAT with repo + workflow scope (added as TOOLING_UPDATE_TOKEN) lets the
          # update push changes to .github/workflows/** — the default token cannot.
          token: ${{ secrets.TOOLING_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest tooling and run the installer in update mode
        id: apply
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ inputs.source_ref }}
          ENABLE_NEW: ${{ inputs.enable_new_capabilities }}
        run: |
          set -euo pipefail
          CFG=.github/labview-ci.yml
          if [ ! -f "$CFG" ]; then
            echo "::error::$CFG not found — this repo is not configured as a LabVIEW CI consumer."
            exit 1
          fi

          SRC_REPO=$(awk '/^[[:space:]]*repo:[[:space:]]/{print $2; exit}' "$CFG")
          SRC_REPO=${SRC_REPO:-elijah286/Extensible-Config-Dialog}
          INSTALLED=$(awk '/^[[:space:]]*installedVersion:[[:space:]]/{print $2; exit}' "$CFG")
          MAXPAR=$(awk '/^[[:space:]]*maxParallel:[[:space:]]/{print $2; exit}' "$CFG")
          echo "source repo: $SRC_REPO  installed: ${INSTALLED:-unknown}"

          # Relocation pointer. The single place that lets the whole tooling move
          # to a new official home (e.g. an NI-owned repo): .github/labview-ci/source.json
          # in the source repo names where the tooling officially lives. If it names a
          # DIFFERENT repo than the one we pull from, the tooling has relocated, so follow
          # it and pull this update from the new home. install.py records the FETCHED
          # catalog's source.repo into .github/labview-ci.yml, so after this one redirected
          # update the client polls the new home directly (no more hops). Probe the source's
          # live channel (its default branch via HEAD); a pinned source_ref is honored as-is.
          # NOTE: keep this python one-liner on a SINGLE line. A multi-line inline
          # `python3 -c '...'` would sit at column 0 and break out of this YAML
          # `run: |` block scalar (invalid-workflow-file error). The surrounding
          # `2>/dev/null || echo ""` already yields "" on empty/invalid JSON, so no
          # in-python try/except is needed.
          SUCC=$(curl -fsSL "https://raw.githubusercontent.com/${SRC_REPO}/HEAD/.github/labview-ci/source.json" 2>/dev/null \
            | python3 -c 'import sys,json; print((json.load(sys.stdin).get("repo") or "").strip())' 2>/dev/null || echo "")
          if [ -n "$SUCC" ] && [ "$(printf %s "$SUCC" | tr A-Z a-z)" != "$(printf %s "$SRC_REPO" | tr A-Z a-z)" ]; then
            echo "::notice::LabVIEW CI tooling has relocated: ${SRC_REPO} -> ${SUCC}. Pulling the update from the new home."
            SRC_REPO="$SUCC"
          fi

          REF="$INPUT_REF"
          if [ -z "$REF" ]; then
            REF=$(gh api "repos/$SRC_REPO" --jq '.default_branch' 2>/dev/null || echo main)
          fi
          echo "fetching ${SRC_REPO}@${REF}"

          SRC_DIR="$(mktemp -d)"
          if ! curl -fsSL "https://codeload.github.com/${SRC_REPO}/tar.gz/${REF}" | tar -xz -C "$SRC_DIR" --strip-components=1; then
            echo "::error::could not download tooling from ${SRC_REPO}@${REF}."
            exit 1
          fi
          if [ ! -f "$SRC_DIR/.github/labview-ci/install.py" ]; then
            echo "::error::installer not found in the fetched tooling."
            exit 1
          fi

          LATEST=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['version'])" "$SRC_DIR/.github/labview-ci/catalog.json")
          echo "latest published version: $LATEST"

          # Activity set: keep current selection, optionally add new stable capabilities.
          ACTS=$(SRC_DIR="$SRC_DIR" python3 - <<'PY'
          import os, re, json
          cur, in_acts = [], False
          for line in open('.github/labview-ci.yml', encoding='utf-8'):
              if re.match(r'^\s*activities:\s*$', line):
                  in_acts = True; continue
              if in_acts:
                  m = re.match(r'^\s*-\s*(\S+)', line)
                  if m: cur.append(m.group(1)); continue
                  in_acts = False
          if os.environ.get('ENABLE_NEW', 'true').lower() == 'true':
              cat = json.load(open(os.path.join(os.environ['SRC_DIR'], '.github/labview-ci/catalog.json'), encoding='utf-8'))
              for c in cat.get('capabilities', []):
                  if c.get('status') == 'stable' and c['id'] not in cur:
                      cur.append(c['id'])
          print(','.join(cur))
          PY
          )
          echo "activities to install: $ACTS"

          python3 "$SRC_DIR/.github/labview-ci/install.py" --update \
            --source "$SRC_DIR" --target "$PWD" \
            --repo "$GITHUB_REPOSITORY" \
            --activities "$ACTS"

          # Restore runner concurrency (install.py's manifest writer omits it).
          if [ -n "${MAXPAR:-}" ]; then
            MAXPAR="$MAXPAR" python3 - <<'PY'
          import os, re
          mp = os.environ['MAXPAR']
          p = '.github/labview-ci.yml'
          lines = open(p, encoding='utf-8').read().splitlines()
          if not any('maxParallel:' in l for l in lines):
              out = []
              for line in lines:
                  out.append(line)
                  if re.match(r'^\s*os:\s*\[', line):
                      out.append('  concurrency:')
                      out.append(f'    maxParallel: {mp}')
              open(p, 'w', encoding='utf-8').write('\n'.join(out) + '\n')
              print(f'restored maxParallel: {mp}')
          PY
          fi

          {
            echo "installed=${INSTALLED:-unknown}"
            echo "latest=$LATEST"
            echo "source_repo=$SRC_REPO"
          } >> "$GITHUB_OUTPUT"

      - name: Open the upgrade pull request
        env:
          GH_TOKEN: ${{ secrets.TOOLING_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          INSTALLED: ${{ steps.apply.outputs.installed }}
          LATEST: ${{ steps.apply.outputs.latest }}
          SOURCE_REPO: ${{ steps.apply.outputs.source_repo }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            {
              echo "## ✅ Already up to date"
              echo ""
              echo "This repository already runs the latest LabVIEW CI tooling (**v${LATEST}**). No changes were needed."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "No changes — already up to date."
            exit 0
          fi

          BRANCH="ci/adopt-tooling-v${LATEST}"
          git checkout -B "$BRANCH"
          git add -A
          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')

          {
            echo "Adopts the latest LabVIEW CI tooling (**v${INSTALLED} → v${LATEST}**) from \`${SOURCE_REPO}\`."
            echo ""
            echo "This is a **full update**: every tooling file for this repo's selected capabilities was"
            echo "re-pulled at the latest version (new capabilities included), rebranded to this repo, with your"
            echo "own configuration and baked dependencies preserved. **${CHANGED} file(s)** changed."
            echo ""
            echo "Triggered from the dashboard **Update now** button. Review and merge to finish — the version"
            echo "badge turns green and the pipeline runs the updated capabilities."
            echo ""
            echo "> **See an older update PR, or a merge conflict?** You can ignore it — only this PR (the newest, **v${LATEST}**) matters. Any older \`ci/adopt-tooling-*\` update PR is closed automatically. And if this PR ever shows a conflict on \`catalog.json\` / \`labview-ci.yml\`, don't hand-resolve it: just click **Update now** again. That rebuilds this branch from the latest default branch, which clears the conflict (the update replaces those files wholesale, so there is never anything real to merge by hand)."
          } > /tmp/pr-body.md

          git commit -m "ci: adopt LabVIEW CI tooling v${LATEST} (full update)"

          # Pushing .github/workflows/** needs a token with `workflow` scope;
          # with only the built-in token GitHub rejects the whole branch. But the
          # workflow YAMLs are THIN callers that read the tooling ref from
          # .github/labview-ci.yml at RUNTIME, so the rest of the update — the ref
          # bump + vendored scripts + pages — adopts the new version on its own
          # (the dashboard caller checks the tooling out at the bumped ref and runs
          # the fixed generator). So when the push is refused only for workflow
          # scope, defer just those YAMLs and push the part that actually fixes the
          # pipeline, instead of dropping the entire update. DEFERRED_WF carries the
          # count into the PR body / summary.
          DEFERRED_WF=0

          if ! git push -u origin "$BRANCH" --force 2>/tmp/push-err; then
            cat /tmp/push-err || true
            if grep -qi 'workflow' /tmp/push-err; then
              # Re-commit WITHOUT the workflow YAMLs so the default token can push.
              DEFERRED_WF=$(git diff --name-only HEAD~1 HEAD -- '.github/workflows' | grep -c . || true)
              git reset --soft HEAD~1
              # Strip EVERY workflow change from the commit -- modified, deleted, AND
              # newly added. `git checkout HEAD -- <path>` only reverts files that
              # already exist in HEAD, so a brand-new YAML (e.g. a new capability's
              # workflow) would survive and the re-push is refused again. Unstage the
              # paths, restore the tracked ones, then delete the now-untracked new
              # files so the following `git add -A` cannot re-stage them.
              git reset -q HEAD -- '.github/workflows' 2>/dev/null || true
              git checkout -q -- '.github/workflows' 2>/dev/null || true
              git clean -fdq -- '.github/workflows' 2>/dev/null || true
              git add -A
              if [ -z "$(git diff --cached --name-only)" ]; then
                {
                  echo "## ⚠️ This update only changes workflow files — add a one-time token"
                  echo ""
                  echo "Everything new in **v${LATEST}** lives in GitHub **workflow files**, which the built-in"
                  echo "token cannot push. Two ways to finish:"
                  echo ""
                  echo "**Easiest — from the dashboard, no settings trip.** Open **What's New ▸ Update now**. When no pull request appears it now shows an **\"add a one-time workflow token\"** field with a ready-made token link (Contents + Workflows + Pull requests + Secrets = Read and write). Paste the token there; the page seals it in your browser, stores it as this repo's \`TOOLING_UPDATE_TOKEN\` secret, and restarts the update."
                  echo ""
                  echo "**Or add the secret yourself:**"
                  echo "1. Create a token — classic PAT: \`repo\` + \`workflow\`; or fine-grained: **Contents + Workflows + Pull requests** = Read and write."
                  echo "2. Add it as the repository secret **TOOLING_UPDATE_TOKEN** (Settings ▸ Secrets and variables ▸ Actions)."
                  echo "3. Re-run **Update now**."
                } >> "$GITHUB_STEP_SUMMARY"
                echo "::warning title=Token needed::This update only changes workflow files; pushing them needs a one-time TOOLING_UPDATE_TOKEN. Add it inline from the What's New > Update now page, or as a repo secret."
                git push origin --delete "$BRANCH" >/dev/null 2>&1 || true
                exit 0
              fi
              CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
              git commit -m "ci: adopt LabVIEW CI tooling v${LATEST} (config + scripts; ${DEFERRED_WF} workflow file(s) deferred)"
              if ! git push -u origin "$BRANCH" --force 2>/tmp/push-err2; then
                cat /tmp/push-err2 || true
                echo "::error title=Push failed::Could not push the update branch."
                exit 1
              fi
            else
              echo "::error title=Push failed::Could not push the update branch."
              exit 1
            fi
          fi

          # When workflow YAMLs were held back, say so in the PR — the version
          # still adopts (runtime callers load the bumped ref), only the YAMLs wait
          # on a PAT.
          if [ "${DEFERRED_WF:-0}" -gt 0 ]; then
            {
              echo ""
              echo "> ⚠️ **${DEFERRED_WF} workflow file(s) deferred.** The token available to this run cannot push"
              echo "> \`.github/workflows/**\`, so those YAMLs keep their current version. The dashboard and reusable"
              echo "> tooling still update — they load the tooling at the bumped ref at runtime. To also refresh the"
              echo "> workflow YAMLs, add a **TOOLING_UPDATE_TOKEN** secret (repo + workflow scope) and re-run **Update now**."
            } >> /tmp/pr-body.md
          fi

          URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -n "$URL" ]; then
            gh pr edit "$URL" --body-file /tmp/pr-body.md >/dev/null || true
            echo "Updated existing PR: $URL"
          elif URL=$(gh pr create --title "ci: adopt LabVIEW CI tooling v${LATEST}" \
                       --base "${{ github.ref_name }}" --head "$BRANCH" \
                       --body-file /tmp/pr-body.md 2>/tmp/pr-err); then
            echo "Opened PR: $URL"
          else
            cat /tmp/pr-err || true
            URL="${{ github.server_url }}/${{ github.repository }}/compare/${{ github.ref_name }}...${BRANCH}?expand=1"
            echo "::warning title=Open the PR manually::GitHub Actions is not permitted to open PRs in this repo. Enable Settings > Actions > General > 'Allow GitHub Actions to create and approve pull requests', or use the link in the summary. The branch is already pushed."
            {
              echo "## ⬆️ Upgrade branch ready — open the pull request"
              echo ""
              echo "Adopts LabVIEW CI tooling **v${INSTALLED} → v${LATEST}** (committed to branch \`${BRANCH}\`, ${CHANGED} file(s))."
              echo ""
              echo "**[Open the pull request](${URL})** to review and merge."
              echo ""
              echo "> To make this fully one-click next time, enable **Settings > Actions > General > Workflow permissions > 'Allow GitHub Actions to create and approve pull requests'**."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Keep only ONE open update PR. A previous "Update now" that was never
          # merged leaves a per-version branch behind; once this repo's default
          # branch moves on, that stale branch collides on catalog.json /
          # labview-ci.yml — a "conflict" that is never a real conflict, because the
          # update overwrites those files wholesale. Close every OTHER open update
          # PR and delete its branch so the newest one is the only thing you see.
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName|test("^ci/(adopt|update)-tooling-v")) | "\(.number)\t\(.headRefName)"' 2>/dev/null \
          | while IFS=$'\t' read -r num ref; do
              if [ -z "${num:-}" ] || [ "$ref" = "$BRANCH" ]; then continue; fi
              if gh pr close "$num" --delete-branch \
                   --comment "Superseded by the newer update to **v${LATEST}** (branch \`${BRANCH}\`). This PR targeted an older version and would conflict with the current default branch, so it is closed automatically — there is nothing to resolve here." >/dev/null 2>&1; then
                echo "Superseded stale update PR #$num ($ref)"
              else
                echo "Could not close PR #$num ($ref) — continuing"
              fi
            done || true

          {
            echo "## ✅ Upgrade pull request ready"
            echo ""
            echo "Adopts LabVIEW CI tooling **v${INSTALLED} → v${LATEST}** (${CHANGED} file(s) changed)."
            echo ""
            echo "**[Review &amp; merge the pull request](${URL})** to finish the update."
          } >> "$GITHUB_STEP_SUMMARY"
