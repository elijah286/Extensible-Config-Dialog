name: Build LabVIEW CI Image - Linux

on:
  # The image build is a heavy CI process, so it never auto-runs on an
  # install/deploy (which only adds tooling under .github/). It rebuilds when
  # YOUR project's dependencies change (a *.vipc outside the tooling dir), monthly
  # for base-image security updates, or on demand from the dashboard / dispatch.
  push:
    branches: [master]
    paths:
      - '**.vipc'
      - '!.github/**'
  schedule:
    # Monthly rebuild to pick up NI base image security updates
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      nipm_feed_url:
        description: 'nipkg feed URL for the LabVIEW version (leave blank for default 2026)'
        required: false
        default: ''
      push_latest:
        description: 'Also tag the image as :linux-latest'
        type: boolean
        default: false

env:
  # IMAGE_NAME is populated at runtime by the resolve step below (-> $GITHUB_ENV);
  # declared here as empty so it is an always-defined env key.
  IMAGE_NAME: ''
  DEFAULT_TAG: linux-${{ vars.LABVIEW_VERSION || '2026' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-labview-linux-image
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Decide whether to rebuild
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, re, subprocess, pathlib
          def emit(b):
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('build=%s\n' % ('true' if b else 'false'))
            print('rebuild =', b)
            raise SystemExit(0)
          try:
            if os.environ.get('EVENT_NAME', '') != 'push':
              emit(True)
            before = os.environ.get('BEFORE', '') or ''
            sha = os.environ.get('SHA', '') or 'HEAD'
            if not before or set(before) == {'0'}:
              emit(True)
            diff = subprocess.run(['git', 'diff', '--name-only', before, sha],
                      capture_output=True, text=True)
            if diff.returncode != 0:
              emit(True)
            files = [f for f in diff.stdout.splitlines() if f.strip()]
            if not files:
              emit(True)
            is_vipc = lambda f: f.lower().endswith('.vipc')
            nonvipc = [f for f in files if not is_vipc(f) and (
              f == '.github/docker/labview-ci-linux.Dockerfile' or
              f == '.github/workflows/build-labview-linux-image.yml')]
            if nonvipc:
              emit(True)
            vipc_changed = [f for f in files if is_vipc(f)]
            if not vipc_changed:
              emit(True)
            monitor = {}
            cfg = pathlib.Path('.github/labview-ci.yml')
            if cfg.exists():
              in_c = in_v = False; cur = None
              for line in cfg.read_text(encoding='utf-8').splitlines():
                if re.match(r'^\s*container:\s*$', line):
                  in_c = True; in_v = False; continue
                if in_c and re.match(r'^\s{4}vipc:\s*$', line):
                  in_v = True; continue
                if in_v:
                  m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                  if m:
                    cur = os.path.basename(m.group(1).strip())
                    monitor.setdefault(cur, True); continue
                  m = re.match(r'^\s{8}monitor:\s*(\S+)', line)
                  if m and cur is not None:
                    monitor[cur] = (m.group(1).strip().lower() == 'true'); continue
                  if re.match(r'^\s{0,4}\S', line):
                    in_v = False; in_c = False
                elif in_c and re.match(r'^\S', line):
                  in_c = False
            for f in vipc_changed:
              if monitor.get(os.path.basename(f), True):
                emit(True)
            emit(False)
          except SystemExit:
            raise
          except Exception as e:
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('build=true\n')
            print('gate error -> build=true:', e)
          PY

  build-and-push:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name and date tag
        id: date
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner}/${name}" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Resolve feed URL
        id: feed
        run: |
          INPUT="${{ github.event.inputs.nipm_feed_url }}"
          if [ -n "$INPUT" ]; then
            echo "url=$INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://download.ni.com/support/nipkg/products/ni-l/ni-labview-2026/26.1/released" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage repo VIPC files
        run: |
          python3 - <<'PY'
          import os, re, glob, shutil, pathlib
          dest = pathlib.Path('.github/labview/vipm'); dest.mkdir(parents=True, exist_ok=True)
          paths = []
          cfg = pathlib.Path('.github/labview-ci.yml')
          if cfg.exists():
            in_c = in_v = False
            for line in cfg.read_text(encoding='utf-8').splitlines():
              if re.match(r'^\s*container:\s*$', line):
                in_c = True; in_v = False; continue
              if in_c and re.match(r'^\s{4}vipc:\s*$', line):
                in_v = True; continue
              if in_v:
                m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                if m:
                  paths.append(m.group(1).strip()); continue
                if re.match(r'^\s{0,4}\S', line):
                  in_v = False; in_c = False
              elif in_c and re.match(r'^\S', line):
                in_c = False
          if not paths:
            paths = sorted(glob.glob('*.vipc'))
          staged = 0
          for p in paths:
            if os.path.isfile(p):
              shutil.copy2(p, dest / os.path.basename(p))
              print('Staged VIPC:', p); staged += 1
            else:
              print('Configured VIPC not found (skipping):', p)
          if not staged:
            print('No VIPC files to stage.')
          PY

      - name: Compute worker version
        id: ver
        run: |
          python3 - <<'PY'
          import hashlib, pathlib, os
          files = [pathlib.Path('.github/docker/labview-ci-linux.Dockerfile')]
          files += sorted(pathlib.Path('.github/labview/vipm').glob('*.vipc'), key=lambda p: p.name)
          parts = []
          for path in files:
            if path.exists():
              parts.append(f'{path.name}={hashlib.sha256(path.read_bytes()).hexdigest()}')
          digest = hashlib.sha256('\n'.join(parts).encode('utf-8')).hexdigest()
          version = 'linux-' + digest[:12]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'version={version}\n')
          print('Worker version:', version)
          PY

      - name: Build and push LabVIEW Linux CI image
        run: |
          BASE="${{ env.IMAGE_NAME }}"
          TAG="${{ env.DEFAULT_TAG }}"
          DATE="${{ steps.date.outputs.date }}"
          FEED="${{ steps.feed.outputs.url }}"
          WV="${{ steps.ver.outputs.version }}"

          TAGS="-t ${BASE}:${TAG} -t ${BASE}:${TAG}-${DATE} -t ${BASE}:${WV} -t ${BASE}:linux-latest"
          if [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
            echo "push_latest is kept for compatibility; :linux-latest is always published."
          fi

          docker buildx build \
            --platform linux/amd64 \
            --file .github/docker/labview-ci-linux.Dockerfile \
            --build-arg NIPM_FEED_URL="${FEED}" \
            --build-arg CI_WORKER_VERSION="${WV}" \
            $TAGS \
            --push \
            .

      - name: Summary
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ steps.date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\` (immutable worker tag)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:linux-latest\`" >> "$GITHUB_STEP_SUMMARY"
