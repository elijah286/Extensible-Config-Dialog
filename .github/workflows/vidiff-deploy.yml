name: VIDiff Deploy — Pages + PR Comment

on:
  workflow_run:
    workflows:
      - "VIDiff Report — Windows Container"
      - "VIDiff Report — Linux Container"
    types: [completed]

env:
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pull-requests: write
  pages: write
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Run whether the VIDiff workflow passed or failed — we still want the report
    if: always()

    steps:
      - name: Download VIDiff artifact
        uses: actions/github-script@v7
        id: artifact
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              run_id,
            });
            // Accept both windows and linux artifact names
            const art = artifacts.data.artifacts.find(a =>
              a.name.startsWith('vidiff-windows-') || a.name.startsWith('vidiff-linux-')
            );
            if (!art) {
              core.warning('No VIDiff artifact found — skipping deploy.');
              return null;
            }
            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              artifact_id: art.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('/tmp/vidiff-artifact.zip', Buffer.from(dl.data));
            return art.name;

      - name: Extract artifact
        if: steps.artifact.outputs.result != 'null'
        run: |
          mkdir -p /tmp/vidiff-report
          unzip -q /tmp/vidiff-artifact.zip -d /tmp/vidiff-report

      - name: Read metadata
        if: steps.artifact.outputs.result != 'null'
        id: meta
        run: |
          META=$(cat /tmp/vidiff-report/vidiff-meta.json 2>/dev/null || echo '{}')
          echo "head_sha=$(echo $META | python3 -c "import sys,json; print(json.load(sys.stdin).get('head_sha',''))")" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo $META | python3 -c "import sys,json; print(json.load(sys.stdin).get('pr_number',''))")" >> "$GITHUB_OUTPUT"
          echo "platform=$(echo $META | python3 -c "import sys,json; print(json.load(sys.stdin).get('platform','windows'))")" >> "$GITHUB_OUTPUT"
          echo "outcome=$(echo $META | python3 -c "import sys,json; print(json.load(sys.stdin).get('outcome','unknown'))")" >> "$GITHUB_OUTPUT"

      - name: Deploy VIDiff report to GitHub Pages
        if: steps.artifact.outputs.result != 'null'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/vidiff-report
          # push-SHORT_SHA/windows or pr-NUMBER/linux
          destination_dir: >-
            vidiff/${{
              steps.meta.outputs.pr_number != '' &&
              format('pr-{0}', steps.meta.outputs.pr_number) ||
              format('push-{0}', steps.meta.outputs.head_sha)
            }}/${{ steps.meta.outputs.platform }}
          keep_files: true

      - name: Build report URL
        if: steps.artifact.outputs.result != 'null'
        id: url
        run: |
          SHA="${{ steps.meta.outputs.head_sha }}"
          PR="${{ steps.meta.outputs.pr_number }}"
          PLATFORM="${{ steps.meta.outputs.platform }}"
          if [ -n "$PR" ]; then
            # PR head snapshots aren't published to the VI Browser, so link the
            # standalone diff report table for PRs.
            echo "url=${{ env.PAGES_URL }}/vidiff/pr-${PR}/${PLATFORM}/vidiff/index.html" >> "$GITHUB_OUTPUT"
          else
            # For pushes (what the dashboard shows), open the unified VI Browser
            # filtered to this commit's changed VIs; each links to its diff report.
            echo "url=${{ env.PAGES_URL }}/vi-snapshots/index.html?sha=${SHA}&changed=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Post commit status
        if: steps.artifact.outputs.result != 'null'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.meta.outputs.head_sha }}"
          STATE="${{ steps.meta.outputs.outcome == 'success' && 'success' || 'failure' }}"
          PLATFORM="${{ steps.meta.outputs.platform }}"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${SHA}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"${{ steps.url.outputs.url }}\",\"description\":\"VIDiff ($PLATFORM) $STATE\",\"context\":\"CI / VIDiff (${PLATFORM})\"}"

      # ── Post PR comment with diff table ────────────────────────────────────
      - name: Post PR comment
        if: >
          steps.artifact.outputs.result != 'null' &&
          steps.meta.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber  = parseInt('${{ steps.meta.outputs.pr_number }}');
            const reportUrl = '${{ steps.url.outputs.url }}';
            const platform  = '${{ steps.meta.outputs.platform }}';
            const outcome   = '${{ steps.meta.outputs.outcome }}';
            const status    = outcome === 'success' ? '✅ Passed' : '❌ Failed';

            const body = [
              `## VIDiff Report (${platform})`,
              '',
              `| Status | Report |`,
              `|--------|--------|`,
              `| ${status} | [View diff report](${reportUrl}) |`,
              '',
              `_Generated by the VIDiff workflow on ${new Date().toUTCString()}_`,
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith(`## VIDiff Report (${platform})`)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
