name: Copy LabVIEW CI Image (install seed)
run-name: Copy Windows worker image (seed from LCWC base, no build)

on:
  # The install seed COPY. This is a distinct action from "Build LabVIEW CI Image"
  # (which bakes dependencies): it only crane-copies the shared LCWC Windows base
  # into this repository's own GHCR worker package -- a fast registry copy, never a
  # rebuild. The installer dispatches it once on a fresh install; dependency baking
  # is the separate Build workflow run from the Dependencies page afterwards.
  workflow_dispatch:

env:
  IMAGE_NAME: ''
  PAGES_URL: ''
  DEFAULT_TAG: ${{ vars.LABVIEW_VERSION || '2026' }}
  # The shared LCWC Windows base image, owned by the source repo's GHCR. Clients
  # copy it; they never build it (the source publishes it via Build LabVIEW CI
  # Image). The lowercase reference is immune to the installer's branding rewrite.
  LCWC_BASE_IMAGE: ${{ vars.LCWC_BASE_IMAGE || 'ghcr.io/elijah286/labview-ci-with-containers-labview-base:2026' }}

permissions:
  contents: write   # also publishes the worker manifest to the gh-pages branch
  packages: write

concurrency:
  group: build-labview-windows-image   # shares the lane with the Build workflow so the two never race the worker-manifest publish
  cancel-in-progress: false

jobs:
  copy-and-push:
    # Pure registry copy: crane only, no Docker -- so it runs on ubuntu-latest,
    # whose fast network copies the multi-GB base image in a couple of minutes.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name and date tag
        id: date
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          PAGES_URL_OVERRIDE: ${{ vars.PAGES_URL }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner}/${name}" >> "$GITHUB_ENV"
          echo "PAGES_URL=${PAGES_URL_OVERRIDE:-https://${owner}.github.io/${GITHUB_REPOSITORY##*/}}" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Set up crane (registry copy tool)
        shell: bash
        run: |
          ver=v0.20.2
          url="https://github.com/google/go-containerregistry/releases/download/${ver}/go-containerregistry_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" | tar -xz -C "$tmp"
          echo "$tmp" >> "$GITHUB_PATH"
          "$tmp/crane" version

      - name: Resolve the LCWC base image digest
        id: base
        shell: bash
        run: |
          set -euo pipefail
          base_image="${LCWC_BASE_IMAGE}"
          case "$base_image" in *:*) ;; *) base_image="${base_image}:${DEFAULT_TAG}";; esac
          digest="$(crane digest "$base_image" 2>/dev/null || true)"
          if [ -z "$digest" ]; then
            echo "::error::Could not read the LCWC base image '${base_image}' from the registry. Confirm the source GHCR package is public/readable, or set the LCWC_BASE_IMAGE repository variable to a readable base image."
            exit 1
          fi
          echo "image=${base_image}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "LCWC base image: ${base_image}  digest: ${digest}"

      # Worker version = short SHA-256 over the LCWC seed image + its digest. A seed
      # copy bakes no dependencies, so vipc-count is always 0. Same inputs -> same tag.
      - name: Compute worker version
        id: ver
        shell: bash
        env:
          BASE_IMAGE: ${{ steps.base.outputs.image }}
          BASE_DIGEST: ${{ steps.base.outputs.digest }}
        run: |
          python3 - <<'PY'
          import hashlib, os
          parts = [
              f"lcwc-base-image={os.environ['BASE_IMAGE']}",
              f"lcwc-base-digest={os.environ['BASE_DIGEST']}",
              "vipc-count=0",
          ]
          digest = hashlib.sha256('\n'.join(parts).encode('utf-8')).hexdigest()
          version = 'win-' + digest[:12]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'version={version}\n')
          print('Worker version:', version)
          PY

      - name: Copy and tag the Windows worker image
        shell: bash
        env:
          BASE_IMAGE: ${{ steps.base.outputs.image }}
        run: |
          set -euo pipefail
          base="${IMAGE_NAME}"
          tag="${DEFAULT_TAG}"
          date_tag="${{ steps.date.outputs.date }}"
          wv="${{ steps.ver.outputs.version }}"
          echo "::notice::Copying the shared LCWC Windows base image (${BASE_IMAGE}) into ${base} with crane -- a registry-to-registry copy, no rebuild. Dependencies are applied afterwards by the separate Build LabVIEW CI Image workflow."
          immutable="${base}:${wv}"
          crane copy "${BASE_IMAGE}" "${immutable}"
          for t in "${tag}" "${tag}-${date_tag}" "latest"; do
            crane tag "${immutable}" "${t}"
            echo "Published (registry copy): ${base}:${t}"
          done
          echo "Published (registry copy): ${immutable}"

      - name: Generate worker manifest
        shell: bash
        env:
          BASE_IMAGE: ${{ steps.base.outputs.image }}
          BASE_DIGEST: ${{ steps.base.outputs.digest }}
        run: |
          set -euo pipefail
          wv="${{ steps.ver.outputs.version }}"
          image_ref="${IMAGE_NAME}:${wv}"
          out_dir="ci-out/workers-pages/workers/windows/${wv}"
          mkdir -p ci-out/worker "$out_dir"
          : > ci-out/worker/nipkg-list.txt
          : > ci-out/worker/vipm-list.txt

          python3 .github/labview/build-worker-manifest.py \
            --platform windows \
            --version "$wv" \
            --nipkg-list ci-out/worker/nipkg-list.txt \
            --vipm-list ci-out/worker/vipm-list.txt \
            --labview-version "${{ vars.LABVIEW_VERSION || '2026' }}" \
            --pages-url "${PAGES_URL}" \
            --base-image "${BASE_IMAGE}" \
            --base-digest "${BASE_DIGEST}" \
            --seed-image "${BASE_IMAGE}" \
            --seed-digest "${BASE_DIGEST}" \
            --worker-layer seed-only-copy \
            --image-ref "$image_ref" \
            --git-sha "${{ github.sha }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --out-dir "$out_dir"

          cat > "ci-out/workers-pages/workers/windows/latest.json" <<JSON
          {
            "version": "$wv",
            "platform": "windows",
            "manifest_url": "${PAGES_URL}/workers/windows/$wv/manifest.html",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_sha": "${{ github.sha }}"
          }
          JSON

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Publish worker manifest to GitHub Pages
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/workers-pages
          commit_message: Publish Windows worker manifest
      - name: Summary
        shell: bash
        run: |
          echo "### Windows worker image copied (install seed)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\` (immutable worker tag)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Seed copy only -- no dependencies baked. Apply project dependencies with the **Build LabVIEW CI Image** workflow from the Dependencies page." >> "$GITHUB_STEP_SUMMARY"
