name: VIDiff Report — Windows Container

on:
  pull_request:
    paths:
      - '**.vi'
      - '**.ctl'
  push:
    branches: [main]
    paths:
      - '**.vi'
      - '**.ctl'
  workflow_dispatch:
    inputs:
      base_sha:
        description: 'Base commit SHA'
        required: false
        default: ''
      head_sha:
        description: 'Head commit SHA'
        required: false
        default: ''

env:
  # Base NI image already includes everything VIDiff needs (CreateComparisonReport /
  # PrintToSingleFileHtml). The custom GHCR image build is not required here.
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

permissions:
  contents: read
  statuses: write
  packages: read

jobs:
  vidiff:
    runs-on: windows-2022   # windows-latest = Server 2025, broken Docker daemon

    steps:
      - name: Determine SHAs
        id: shas
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expand() {
            local s="$1"
            [ -z "$s" ] && echo "" && return
            gh api "repos/${{ github.repository }}/commits/$s" --jq '.sha' 2>/dev/null || echo "$s"
          }
          if [ -n "${{ github.event.inputs.head_sha }}" ]; then
            HEAD=$(expand "${{ github.event.inputs.head_sha }}")
            BASE=$(expand "${{ github.event.inputs.base_sha }}")
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            HEAD="${{ github.event.pull_request.head.sha }}"
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            HEAD="${{ github.sha }}"
            BASE="${{ github.event.before }}"
          fi
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.shas.outputs.head }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"VIDiff in progress\",\"context\":\"CI / VIDiff (windows)\"}"

      - name: Checkout head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.shas.outputs.head }}
          fetch-depth: 0
          path: head

      - name: Checkout base commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.shas.outputs.base }}
          path: base

      # Restore CI scripts from main when using manual dispatch
      - name: Restore CI scripts from main
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        working-directory: head
        run: git checkout origin/main -- .github/labview .github/workflows

      - name: Get list of changed VI/CTL files
        id: changed
        shell: bash
        run: |
          cd head
          if [ -n "${{ steps.shas.outputs.base }}" ]; then
            FILES=$(git diff --name-only "${{ steps.shas.outputs.base }}" "${{ steps.shas.outputs.head }}" -- '*.vi' '*.ctl' | tr '\n' '\n')
          else
            FILES=$(git diff-tree --no-commit-id -r --name-only "${{ steps.shas.outputs.head }}" -- '*.vi' '*.ctl' | tr '\n' '\n')
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VIDiff renders before/after images of changed VIs and the bare NI base image
      # is sufficient for that. But when the Configure dialog selects a container
      # (config.container.use in head/.github/labview-ci.yml), use that tag of the
      # project's custom worker image so VIs that depend on add-ons still load and
      # render. When unset it stays on the bare base (the original behavior). The
      # head checkout lives under head/, so read the config from there.
      - name: Resolve container image name
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          BASE_IMAGE: nationalinstruments/labview:latest-windows
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          custom="ghcr.io/${owner}/${name}"
          use=""
          if [ -f head/.github/labview-ci.yml ]; then
            use=$(awk '
              /^[[:space:]]*container:[[:space:]]*$/ {inc=1; next}
              inc && /^    use:/ {sub(/^[[:space:]]*use:[[:space:]]*/,""); gsub(/"/,""); print; exit}
              inc && /^[^[:space:]]/ {inc=0}
            ' head/.github/labview-ci.yml | tr -d '[:space:]')
          fi
          if [ -n "$use" ]; then
            if [ "$use" = "latest" ]; then img="${custom}:latest"; else img="${custom}:${use}"; fi
          else
            img="${BASE_IMAGE}"
          fi
          echo "LABVIEW_CONTAINER_IMAGE=${img}" >> "$GITHUB_ENV"
          echo "Resolved container image: ${img}"

      - name: Pull LabVIEW container image
        shell: powershell
        run: |
          docker pull $Env:LABVIEW_CONTAINER_IMAGE
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Pull failed for $Env:LABVIEW_CONTAINER_IMAGE - falling back to the base image."
            $base = 'nationalinstruments/labview:latest-windows'
            "LABVIEW_CONTAINER_IMAGE=$base" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            $Env:LABVIEW_CONTAINER_IMAGE = $base
            docker pull $base
          }

      - name: Run VIDiff inside container
        shell: powershell
        id: diff
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          $workspace = '${{ github.workspace }}'
          docker run --rm `
            -v "${workspace}\head:C:\workspace" `
            -v "${workspace}\base:C:\workspace-base" `
            -e CHANGED_FILES=$Env:CHANGED_FILES `
            -e "GITHUB_REPOSITORY=${{ github.repository }}" `
            $Env:LABVIEW_CONTAINER_IMAGE `
            powershell -NonInteractive -ExecutionPolicy Bypass `
              -File "C:\workspace\.github\labview\vidiff.ps1" `
              -BaseDir      "C:\workspace-base" `
              -HeadDir      "C:\workspace" `
              -ReportDir    "C:\workspace\ci-out\vidiff" `
              -LabVIEWPath  "C:\Program Files\National Instruments\LabVIEW ${{ vars.LABVIEW_VERSION || '2026' }}\LabVIEW.exe"
        continue-on-error: true

      - name: Save metadata for deploy workflow
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/head/ci-out"
          cat > "${{ github.workspace }}/head/ci-out/vidiff-meta.json" <<JSON
          {
            "head_sha":   "${{ steps.shas.outputs.head }}",
            "base_sha":   "${{ steps.shas.outputs.base }}",
            "pr_number":  "${{ steps.shas.outputs.pr_number }}",
            "platform":   "windows",
            "outcome":    "${{ steps.diff.outcome }}"
          }
          JSON

      - name: Upload VIDiff report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidiff-windows-${{ steps.shas.outputs.head }}
          path: |
            ${{ github.workspace }}/head/ci-out/vidiff/
            ${{ github.workspace }}/head/ci-out/vidiff-meta.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail if diff failed
        if: steps.diff.outcome == 'failure'
        run: exit 1
