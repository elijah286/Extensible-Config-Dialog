name: Integrate Configurator — Pages

# Publishes the "Integrate this CI pipeline" configurator (integrate.html), the
# settings editor (configure.html), the What's New / update dialog (whats-new.html),
# and the capability catalog (catalog.json) to the Pages root, so the dashboard
# buttons + version badge have targets and the pages can load the catalog same-origin.
#
# Kept separate from dashboard-pages.yml on purpose: this rarely changes, and a
# standalone deploy keeps the configurator publishing independent of the dashboard
# generator. keep_files:true means it sits alongside the dashboard without clobbering it.

on:
  push:
    branches: [main]
    paths:
      - '.github/pages/integrate.html'
      - '.github/pages/configure.html'
      - '.github/pages/whats-new.html'
      - '.github/labview-ci/catalog.json'
      - '.github/labview/vipm/ci-tooling.packages.json'
      - '.github/workflows/integrate-deploy.yml'
  workflow_dispatch:

concurrency:
  group: integrate-pages-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage configurator + catalog
        run: |
          mkdir -p out
          cp .github/pages/integrate.html out/integrate.html
          cp .github/pages/configure.html out/configure.html
          cp .github/pages/whats-new.html out/whats-new.html
          cp .github/labview-ci/catalog.json out/catalog.json
          cp .github/labview/vipm/ci-tooling.packages.json out/ci-tooling.packages.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out
          destination_dir: .
          keep_files: true
