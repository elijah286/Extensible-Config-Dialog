name: Run VI Analyzer — Windows Container

on:
  pull_request:
    paths:
      - '**.vi'
      - '**.ctl'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvclass'
      - '!.github/**'
  push:
    branches: [master]
    paths:
      - '**.vi'
      - '**.ctl'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvclass'
      - '!.github/**'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to analyze (leave blank for current HEAD)'
        required: false
        default: ''
      files:
        description: 'Re-run only these VIs (pipe-delimited repo paths). Blank = the whole revision.'
        required: false
        default: ''
      config:
        description: 'A committed .viancfg to use for a single-VI re-run (requires files).'
        required: false
        default: ''

env:
  # Custom CI image (built by build-labview-image.yml). GHCR repository names MUST be
  # lowercase, but github.event.repository.name preserves the repo's original case
  # (e.g. "Extensible-Config-Dialog"), which `docker pull` rejects ("repository name
  # must be lowercase") — so no worker ever ran and the dashboard's Win Worker column
  # stayed empty. The image ref is therefore resolved + lowercased at runtime by the
  # "Resolve container image name" step below (-> $GITHUB_ENV); declared empty here so
  # it is always a defined key. Override with vars.LABVIEW_IMAGE_NAME / LABVIEW_VERSION.
  LABVIEW_CONTAINER_IMAGE: ''
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pages: write
  statuses: write
  packages: read
  actions: read   # so wait-for-worker-image.sh can read the worker-image build runs

# Serialize report deploys to gh-pages. peaceiris/actions-gh-pages clones, commits,
# and pushes the branch; two report jobs pushing at once make the loser's push bounce
# with "! [rejected] (fetch first)", so its report never deploys (dashboard 404).
# A shared group across the report-deploy workflows (mass compile + VI Analyzer)
# makes them queue instead of racing. cancel-in-progress:false so a queued run still
# publishes rather than being dropped.
concurrency:
  group: report-pages-deploy
  cancel-in-progress: false

jobs:
  vi-analyzer:
    runs-on: windows-2022   # windows-latest = Server 2025, broken Docker daemon

    steps:
      - name: Determine target SHA
        id: sha
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.commit_sha }}"
          if [ -n "$INPUT" ]; then
            FULL=$(gh api "repos/${{ github.repository }}/commits/$INPUT" --jq '.sha')
            echo "sha=$FULL" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        if: github.event.inputs.files == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"VI Analyzer in progress\",\"context\":\"CI / VI Analyzer\"}"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        shell: bash
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git checkout FETCH_HEAD -- .github/labview .github/workflows

      # GHCR rejects upper-case repository names. The Configure dialog writes the
      # selected container tag to config.container.use in .github/labview-ci.yml
      # (default "latest"); when present, this revision is analyzed inside that tag
      # of the project's custom worker image, so the project's baked VIPC
      # dependencies are available. When absent we use the shared repo worker's
      # latest tag so Windows action runners default to the same container. Runs
      # after checkout so it can read the revision's own config.
      - name: Resolve container image name
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          BASE_IMAGE: nationalinstruments/labview:latest-windows
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          custom="ghcr.io/${owner}/${name}"
          # Per-action container selection. config.container.actions.<id> wins, then
          # the project-wide config.container.use. With neither set VI Analyzer uses
          # the shared custom worker image at :latest. "base" forces the bare NI image;
          # "latest"/"<tag>" select that tag of the custom worker image.
          ACTION_ID="vi-analyzer"
          CFG=.github/labview-ci.yml
          sel=""
          if [ -f "$CFG" ]; then
            sel=$(awk -v act="$ACTION_ID" '
              /^[[:space:]]*container:[[:space:]]*$/ {inc=1; ina=0; next}
              inc && /^    actions:[[:space:]]*$/ {ina=1; next}
              ina && /^      [A-Za-z0-9_.-]+:/ {
                k=$1; sub(/:.*/,"",k);
                v=$0; sub(/^[[:space:]]*[A-Za-z0-9_.-]+:[[:space:]]*/,"",v); gsub(/"/,"",v); gsub(/[[:space:]]/,"",v);
                if (k==act) {print v; exit}
                next
              }
              ina && /^    [A-Za-z]/ {ina=0}
              inc && /^[^[:space:]]/ {inc=0; ina=0}
            ' "$CFG" | tr -d '[:space:]')
            if [ -z "$sel" ]; then
              sel=$(awk '
                /^[[:space:]]*container:[[:space:]]*$/ {inc=1; next}
                inc && /^    use:/ {sub(/^[[:space:]]*use:[[:space:]]*/,""); gsub(/"/,""); print; exit}
                inc && /^[^[:space:]]/ {inc=0}
              ' "$CFG" | tr -d '[:space:]')
            fi
          fi
          if [ -z "$sel" ]; then
            img="${custom}:latest"
          elif [ "$sel" = "base" ] || [ "$sel" = "none" ]; then
            img="${BASE_IMAGE}"
          elif [ "$sel" = "latest" ]; then
            img="${custom}:latest"
          else
            img="${custom}:${sel}"
          fi
          echo "LABVIEW_CONTAINER_IMAGE=${img}" >> "$GITHUB_ENV"
          echo "Resolved container image: ${img}"

      - name: Ensure Docker daemon is running
        shell: powershell
        run: ./.github/labview/ensure-docker.ps1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ordering: if this push changed the worker image inputs (a .vipc, the
      # Dockerfile, or the VIPM assets) then "Build LabVIEW CI Image" is
      # rebuilding the worker for this same commit. Wait for that build to finish
      # before pulling, so analysis runs on the freshly-built worker instead of a
      # stale one. Bounded and best-effort — it never blocks CI indefinitely, and
      # does nothing when no worker-affecting file changed.
      - name: Wait for worker image build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/labview/wait-for-worker-image.sh "${{ steps.sha.outputs.sha }}" "${{ github.event.before }}"

      - name: Pull LabVIEW container image
        id: pull
        shell: powershell
        run: docker pull $Env:LABVIEW_CONTAINER_IMAGE
        continue-on-error: true

      # Read the worker version stamped into the pulled image so the dashboard can
      # link this revision to exactly the worker that analyzed it.
      - name: Read worker version
        id: worker
        if: steps.pull.outcome == 'success'
        shell: powershell
        run: |
          # Best-effort telemetry: read the worker-version label baked into the image
          # so the dashboard can link this revision to its worker manifest. Parse the
          # inspect JSON with PowerShell instead of a `docker inspect --format` Go
          # template -- Windows PowerShell 5.1 mangles the template's embedded double
          # quotes, which made the command fail (empty result + non-zero exit) and took
          # the whole job down with it. This step must NEVER fail CI, hence `exit 0`.
          $img = $Env:LABVIEW_CONTAINER_IMAGE
          $wv = ''
          try {
            $info = docker inspect $img 2>$null | ConvertFrom-Json
            if ($info) { $wv = [string]$info[0].Config.Labels.'com.cotc.ci-worker.version' }
          } catch {}
          if (-not $wv -or $wv -eq '<no value>') { $wv = '' }
          "version=$wv" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Worker version: $wv"
          exit 0

      - name: Run VI Analyzer inside container
        if: steps.pull.outcome == 'success'
        shell: powershell
        id: analyze
        env:
          VIA_FILES: ${{ github.event.inputs.files }}
          VIA_CONFIG: ${{ github.event.inputs.config }}
        run: |
          # VIA_FILES / VIA_CONFIG are passed through to the container by NAME
          # (docker -e VAR), so a single-VI re-run's paths/config never get spliced
          # into the command line; the runner reads them as env fallbacks for
          # -FilesFilter / -ConfigOverride. Empty -> a normal whole-revision run.
          docker run --rm `
            -e "GITHUB_REPOSITORY=${{ github.repository }}" `
            -e VIA_FILES `
            -e VIA_CONFIG `
            -v "${{ github.workspace }}:C:\workspace" `
            $Env:LABVIEW_CONTAINER_IMAGE `
            powershell -NonInteractive -ExecutionPolicy Bypass `
              -File "C:\workspace\.github\labview\run-vi-analyzer.ps1" `
              -WorkspaceRoot  "C:\workspace" `
              -ReportDir      "C:\workspace\ci-out\vi-analyzer" `
              -LabVIEWPath    "C:\Program Files\National Instruments\LabVIEW ${{ vars.LABVIEW_VERSION || '2026' }}\LabVIEW.exe"
        continue-on-error: true

      - name: Check report directory
        id: report
        shell: bash
        run: |
          # A whole-revision run writes index.html (single config) or
          # passes/manifest.json (multi-configuration); a single-VI re-run writes
          # index.html. Either form means a report was produced.
          if [ -f "${{ github.workspace }}/ci-out/vi-analyzer/index.html" ] || [ -f "${{ github.workspace }}/ci-out/vi-analyzer/passes/manifest.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build friendly report (parse native HTML + join snapshots)
        if: steps.report.outputs.exists == 'true'
        shell: bash
        continue-on-error: true   # a formatting hiccup must never block deploying the native report
        env:
          IN_FILES: ${{ github.event.inputs.files }}
        run: |
          # Transform the dense native VI Analyzer report into a navigable one:
          # keeps the original as raw.html, writes summary.json, and replaces
          # index.html with a grouped/filterable report whose per-VI snapshots are
          # resolved client-side from the VI Browser gallery (vi-snapshots/<sha>/).
          # A multi-configuration run is merged from passes/; a single-VI re-run
          # deploys one level deeper (reruns/<slug>) so its links use ../../.. .
          REPORT_DIR="${{ github.workspace }}/ci-out/vi-analyzer"
          if [ -n "$IN_FILES" ]; then
            SRC=(--in "$REPORT_DIR/index.html"); PAGES_BASE="../../.."
          elif [ -f "$REPORT_DIR/passes/manifest.json" ]; then
            SRC=(--passes-dir "$REPORT_DIR/passes"); PAGES_BASE="../.."
          else
            SRC=(--in "$REPORT_DIR/index.html"); PAGES_BASE="../.."
          fi
          python .github/labview/build-analyzer-report.py \
            "${SRC[@]}" \
            --out        "$REPORT_DIR" \
            --pages-base "$PAGES_BASE" \
            --sha        "${{ steps.sha.outputs.sha }}" \
            --platform   windows \
            --repo       "${{ github.repository }}" \
            --pages-url  "${{ env.PAGES_URL }}" \
            --commit-msg "$(git log -1 --pretty=%s   ${{ steps.sha.outputs.sha }})" \
            --author     "$(git log -1 --pretty=%an  ${{ steps.sha.outputs.sha }})" \
            --date       "$(git log -1 --pretty=%cI  ${{ steps.sha.outputs.sha }})"

      - name: Upload report artifact
        if: steps.report.outputs.exists == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: vi-analyzer-report-${{ steps.sha.outputs.sha }}
          path: ${{ github.workspace }}/ci-out/vi-analyzer/
          if-no-files-found: warn

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        if: steps.report.outputs.exists == 'true'
        shell: bash
        run: |
          # peaceiris/actions-gh-pages clones the whole gh-pages branch on the
          # Windows runner. That tree now holds deeply-nested VIDiff report paths
          # that exceed Windows' 260-char MAX_PATH, so the clone checkout dies with
          # "Filename too long" and the report never deploys (dashboard 404).
          # Long-path support lets Git use extended-length paths and succeed.
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Resolve report destination
        id: dest
        if: steps.report.outputs.exists == 'true'
        shell: bash
        env:
          IN_FILES: ${{ github.event.inputs.files }}
          IN_CONFIG: ${{ github.event.inputs.config }}
        run: |
          # A single-VI re-run is published under the revision's report at
          # reruns/<slug> (slug must match the report page's rrSlug), so it never
          # overwrites the revision's canonical VI Analyzer report.
          SHA="${{ steps.sha.outputs.sha }}"
          if [ -n "$IN_FILES" ]; then
            SLUG=$(printf '%s' "${IN_CONFIG}__${IN_FILES}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-80)
            echo "dir=vi-analyzer/${SHA}/reruns/${SLUG}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=vi-analyzer/${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy report to GitHub Pages
        if: steps.report.outputs.exists == 'true'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/ci-out/vi-analyzer
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true

      - name: Post commit status
        if: always() && github.event.inputs.files == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.report.outputs.exists }}" = "true" ]; then
            REPORT_URL="${{ env.PAGES_URL }}/vi-analyzer/${{ steps.sha.outputs.sha }}/index.html"
          else
            REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          if [ "${{ steps.pull.outcome }}" = "success" ] && [ "${{ steps.analyze.outcome }}" = "success" ]; then
            STATE="success"
          else
            STATE="failure"
          fi
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$REPORT_URL\",\"description\":\"VI Analyzer $STATE\",\"context\":\"CI / VI Analyzer\"}"

      # Surface which worker ran this revision as its own commit status; the
      # dashboard renders it as the "Win Worker" column linking to the manifest.
      - name: Post worker version status
        if: always() && steps.pull.outcome == 'success' && steps.worker.outputs.version != '' && github.event.inputs.files == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WV="${{ steps.worker.outputs.version }}"
          URL="${{ env.PAGES_URL }}/workers/windows/${WV}/manifest.html"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"success\",\"target_url\":\"$URL\",\"description\":\"$WV\",\"context\":\"CI / Worker (windows)\"}"

      - name: Fail the job if analysis failed
        if: always() && (steps.pull.outcome != 'success' || steps.analyze.outcome != 'success')
        run: exit 1
