name: Build LabVIEW CI Image

on:
  # The image build is a heavy CI process, so it never auto-runs on an
  # install/deploy (which only adds the tooling Dockerfile + tooling vipc under
  # .github/). It rebuilds when YOUR project's dependencies change (a *.vipc
  # outside the tooling dir), monthly for base-image security updates, or on
  # demand. After install, build it once from the dashboard (or workflow_dispatch).
  push:
    branches: [main]
    paths:
      # Your project's VI Package Configuration(s) are baked into the worker, so
      # changing your dependencies rebuilds it. The tooling's own vipc (added by
      # the install under .github/) is excluded so deploying never triggers a build.
      - '**.vipc'
      - '!.github/**'
  schedule:
    # Monthly rebuild to pick up NI base image security updates
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Deprecated — :latest is always published now (kept for compatibility)'
        type: boolean
        default: true

env:
  # IMAGE_NAME and PAGES_URL are populated at runtime by the resolve step below
  # (-> $GITHUB_ENV); declared here as empty so they are always-defined env keys.
  # Tag = LabVIEW version; override via Actions vars LABVIEW_VERSION / LABVIEW_IMAGE_NAME / PAGES_URL.
  IMAGE_NAME: ''
  PAGES_URL: ''
  DEFAULT_TAG: ${{ vars.LABVIEW_VERSION || '2026' }}

permissions:
  contents: write   # also publishes the worker manifest to the gh-pages branch
  packages: write

# Serialize image builds so two rebuilds (e.g. rapid VIPC edits) never race each
# other's worker-manifest publish to gh-pages. cancel-in-progress:false so a
# queued rebuild still completes and publishes rather than being dropped.
concurrency:
  group: build-labview-windows-image
  cancel-in-progress: false

jobs:
  # Decide whether this push should actually rebuild the worker image. A push that
  # ONLY changes .vipc files that are all flagged monitor:false in
  # .github/labview-ci.yml is a deliberate "pin" (bake once, do not auto-update) and
  # is skipped. Any other worker-affecting change (the Dockerfile, the VIPM assets,
  # or a monitored .vipc) rebuilds, and non-push events (manual dispatch, the monthly
  # cron) always rebuild. On ANY uncertainty or error the gate builds, so the
  # container is never silently left stale.
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to rebuild
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, re, subprocess, pathlib
          def emit(b):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('build=%s\n' % ('true' if b else 'false'))
              print('rebuild =', b)
              raise SystemExit(0)
          try:
              if os.environ.get('EVENT_NAME', '') != 'push':
                  emit(True)
              before = os.environ.get('BEFORE', '') or ''
              sha = os.environ.get('SHA', '') or 'HEAD'
              if not before or set(before) == {'0'}:
                  emit(True)                      # new branch / unknown base
              diff = subprocess.run(['git', 'diff', '--name-only', before, sha],
                                    capture_output=True, text=True)
              if diff.returncode != 0:
                  emit(True)
              files = [f for f in diff.stdout.splitlines() if f.strip()]
              if not files:
                  emit(True)
              is_vipc = lambda f: f.lower().endswith('.vipc')
              # Worker-affecting change that is NOT a .vipc -> always build.
              nonvipc = [f for f in files if not is_vipc(f) and (
                  f == '.github/docker/labview-ci.Dockerfile' or
                  f.startswith('.github/labview/vipm/') or
                  f == '.github/workflows/build-labview-image.yml')]
              if nonvipc:
                  emit(True)
              vipc_changed = [f for f in files if is_vipc(f)]
              if not vipc_changed:
                  emit(True)                      # nothing recognized -> safe build
              # Read monitor flags from config.container.vipc (default: monitored).
              monitor = {}
              cfg = pathlib.Path('.github/labview-ci.yml')
              if cfg.exists():
                  in_c = in_v = False; cur = None
                  for line in cfg.read_text(encoding='utf-8').splitlines():
                      if re.match(r'^\s*container:\s*$', line):
                          in_c = True; in_v = False; continue
                      if in_c and re.match(r'^\s{4}vipc:\s*$', line):
                          in_v = True; continue
                      if in_v:
                          m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                          if m:
                              cur = os.path.basename(m.group(1).strip())
                              monitor.setdefault(cur, True); continue
                          m = re.match(r'^\s{8}monitor:\s*(\S+)', line)
                          if m and cur is not None:
                              monitor[cur] = (m.group(1).strip().lower() == 'true'); continue
                          if re.match(r'^\s{0,4}\S', line):
                              in_v = False; in_c = False
                      elif in_c and re.match(r'^\S', line):
                          in_c = False
              for f in vipc_changed:
                  if monitor.get(os.path.basename(f), True):
                      emit(True)                  # a monitored .vipc changed
              emit(False)                         # all changed .vipc are monitor:false
          except SystemExit:
              raise
          except Exception as e:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('build=true\n')
              print('gate error -> build=true:', e)
          PY

  build-and-push:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    # IMPORTANT: windows-latest resolves to Server 2025 which has a broken
    # Docker daemon. Always pin to windows-2022.
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name and date tag
        id: date
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          PAGES_URL_OVERRIDE: ${{ vars.PAGES_URL }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner}/${name}" >> "$GITHUB_ENV"
          echo "PAGES_URL=${PAGES_URL_OVERRIDE:-https://${owner}.github.io/${GITHUB_REPOSITORY##*/}}" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      # Bake any repo .vipc into the worker: copy repo-root *.vipc next to the
      # VIPM installer so the Dockerfile's existing hook applies it at build time.
      # Globbing here (rather than COPY *.vipc in the Dockerfile) handles the
      # zero-or-more case gracefully and keeps spaces-in-filename safe.
      # Stage the project VIPC files baked into the worker image. When
      # .github/labview-ci.yml lists config.container.vipc entries, exactly those
      # files are baked, so the Configure dialog can choose which dependencies apply
      # and a VIPC can live anywhere in the repo (not just the root). With no list,
      # every repo-root *.vipc is baked (the original behavior).
      - name: Stage repo VIPC files
        shell: bash
        run: |
          python - <<'PY'
          import os, re, glob, shutil, pathlib
          dest = pathlib.Path('.github/labview/vipm'); dest.mkdir(parents=True, exist_ok=True)
          paths = []
          cfg = pathlib.Path('.github/labview-ci.yml')
          if cfg.exists():
              in_c = in_v = False
              for line in cfg.read_text(encoding='utf-8').splitlines():
                  if re.match(r'^\s*container:\s*$', line):
                      in_c = True; in_v = False; continue
                  if in_c and re.match(r'^\s{4}vipc:\s*$', line):
                      in_v = True; continue
                  if in_v:
                      m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                      if m:
                          paths.append(m.group(1).strip()); continue
                      if re.match(r'^\s{0,4}\S', line):
                          in_v = False; in_c = False
                  elif in_c and re.match(r'^\S', line):
                      in_c = False
          if not paths:
              paths = sorted(glob.glob('*.vipc'))
          staged = 0
          for p in paths:
              if os.path.isfile(p):
                  shutil.copy2(p, dest / os.path.basename(p))
                  print('Staged VIPC:', p); staged += 1
              else:
                  print('Configured VIPC not found (skipping):', p)
          if not staged:
              print('No VIPC files to stage.')
          PY

      # Worker version = short SHA-256 over the build inputs (Dockerfile + VIPM
      # installer + every staged .vipc). Same inputs -> same version, so the tag
      # is immutable and a dashboard revision can map to the exact worker.
      - name: Compute worker version
        id: ver
        shell: powershell
        run: |
          $files = @(
            '.github/docker/labview-ci.Dockerfile',
            '.github/labview/vipm/install-vipc.ps1'
          )
          $files += (Get-ChildItem '.github/labview/vipm' -Filter *.vipc -File |
                     Sort-Object Name | ForEach-Object FullName)
          $parts = foreach ($f in $files) {
            if (Test-Path -LiteralPath $f) {
              $h = (Get-FileHash -LiteralPath $f -Algorithm SHA256).Hash.ToLower()
              '{0}={1}' -f ([System.IO.Path]::GetFileName($f)), $h
            }
          }
          $bytes   = [System.Text.Encoding]::UTF8.GetBytes(($parts -join "`n"))
          $digest  = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
          $hex     = -join ($digest | ForEach-Object { $_.ToString('x2') })
          $version = 'win-' + $hex.Substring(0, 12)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Worker version: $version"

      - name: Build and push LabVIEW CI image
        shell: powershell
        run: |
          $base  = '${{ env.IMAGE_NAME }}'
          $ver   = '${{ env.DEFAULT_TAG }}'
          $date  = '${{ steps.date.outputs.date }}'
          $wv    = '${{ steps.ver.outputs.version }}'
          # The immutable per-content tag ($wv) sits alongside the moving tags.
          # :latest is always published so the Configure dialog's default "Latest"
          # container selection reliably resolves to the newest build.
          $tags  = @("${base}:${ver}", "${base}:${ver}-${date}", "${base}:${wv}", "${base}:latest")

          # Build — context is repo root so Dockerfile can COPY vipm/ and .vipc
          $tagFlags = ($tags | ForEach-Object { "-t", $_ })
          docker build -f .github/docker/labview-ci.Dockerfile `
            --build-arg CI_WORKER_VERSION=$wv @tagFlags .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          foreach ($tag in $tags) {
            Write-Host "Pushing $tag"
            docker push $tag
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      # Capture what's installed and render the human/machine worker manifest.
      # All of this is best-effort: a hiccup here must not fail an otherwise good
      # image build (the image is already pushed by this point).
      - name: Generate worker manifest
        shell: powershell
        run: |
          $base   = '${{ env.IMAGE_NAME }}'
          $wv     = '${{ steps.ver.outputs.version }}'
          $img    = "${base}:${wv}"
          $outDir = "ci-out/workers-pages/workers/windows/$wv"
          New-Item -ItemType Directory -Force -Path 'ci-out/worker' | Out-Null

          # Installed-package list captured from inside the freshly built image.
          try {
            docker run --rm $img powershell -NoLogo -NoProfile -Command "nipkg list" 2>$null |
              Out-File -FilePath 'ci-out/worker/nipkg-list.txt' -Encoding utf8
          } catch { Write-Host "nipkg list capture failed: $_" }

          $baseDigest = ''
          try {
            $baseDigest = (docker inspect --format '{{index .RepoDigests 0}}' `
              nationalinstruments/labview:latest-windows 2>$null)
          } catch {}

          $vipcArgs = @()
          Get-ChildItem '.github/labview/vipm' -Filter *.vipc -File |
            ForEach-Object { $vipcArgs += @('--vipc', $_.FullName) }

          python .github/labview/build-worker-manifest.py `
            --platform windows `
            --version $wv `
            --nipkg-list 'ci-out/worker/nipkg-list.txt' `
            --labview-version ${{ vars.LABVIEW_VERSION || '2026' }} `
            --pages-url '${{ env.PAGES_URL }}' `
            --base-image nationalinstruments/labview:latest-windows `
            --base-digest "$baseDigest" `
            --image-ref $img `
            --git-sha '${{ github.sha }}' `
            --run-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' `
            --out-dir $outDir `
            @vipcArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # latest.json pointer for "current Windows worker".
          $latest = [ordered]@{
            version      = $wv
            platform     = 'windows'
            manifest_url = "${{ env.PAGES_URL }}/workers/windows/$wv/manifest.html"
            build_date   = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            git_sha      = '${{ github.sha }}'
          }
          $latest | ConvertTo-Json |
            Out-File -FilePath 'ci-out/workers-pages/workers/windows/latest.json' -Encoding utf8

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        shell: bash
        run: |
          # peaceiris clones the whole gh-pages branch (deeply nested VIDiff paths)
          # on the Windows runner; long-path support avoids "Filename too long".
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Publish worker manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ci-out/workers-pages
          destination_dir: .
          keep_files: true

      - name: Summary
        shell: bash
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ steps.date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\` (immutable worker tag)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Worker version:** \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "[Worker manifest](${{ env.PAGES_URL }}/workers/windows/${{ steps.ver.outputs.version }}/manifest.html)" >> "$GITHUB_STEP_SUMMARY"
