name: Build LabVIEW CI Image
run-name: ${{ github.event_name == 'push' && 'Build Windows worker image (monitored dependency change)' || 'Build Windows worker image (apply dependencies)' }}

on:
  # The image build is a heavy CI process. It NEVER runs on an install/deploy, and
  # by DEFAULT a project dependency change does NOT rebuild the worker either --
  # dependency updates are opt-in (the dashboard's "Review & update dependencies"
  # dialog, which dispatches this workflow, or a manual workflow_dispatch).
  #
  # A project can choose individual monitored dependency files on the Dependencies
  # page (config.container.vipc[].monitor / config.container.dragon[].monitor).
  # When at least one file is monitored, a push that changes a MONITORED *.vipc / *.dragon auto-rebuilds
  # the worker; the gate job below enforces this and skips the build for any change
  # that is not a monitored dependency. Nothing here runs automatically except the
  # monthly base-image rebuild until a monitored file is saved in config.
  push:
    branches: [master]
    paths:
      # Project dependency declarations that can be baked into the worker. The
      # tooling's own files under .github/ are excluded so installing or updating
      # tooling never triggers a build; only the gate's monitor check below decides
      # whether a matching push actually rebuilds.
      - '**.vipc'
      - '**.dragon'
      - '!.github/**'
  schedule:
    # Monthly rebuild to pick up NI base image security updates
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Deprecated — :latest is always published now (kept for compatibility)'
        type: boolean
        default: true
      rebuild_vipm_base:
        description: 'Deprecated - LCWC owns the shared base; source-repo runs publish it automatically'
        type: boolean
        default: false
      rebuild_policy:
        description: 'In-flight CI before the rebuild: drain = let running jobs finish first; cancel = stop them now; config = use .github/labview-ci.yml (default drain)'
        type: choice
        options: [config, drain, cancel]
        default: config
      update_mode:
        description: 'Dependency update: replace = rebuild the current container tags in place (actions keep using them automatically); new = publish a new dated tag ALONGSIDE the current one, to select per-action in Configure Workers'
        type: choice
        options: [replace, new]
        default: replace

env:
  # IMAGE_NAME and PAGES_URL are populated at runtime by the resolve step below
  # (-> $GITHUB_ENV); declared here as empty so they are always-defined env keys.
  # Tag = LabVIEW version; override via Actions vars LABVIEW_VERSION / LABVIEW_IMAGE_NAME / PAGES_URL.
  IMAGE_NAME: ''
  PAGES_URL: ''
  DEFAULT_TAG: ${{ vars.LABVIEW_VERSION || '2026' }}
  # The shared LCWC base image, owned by the source repo's GHCR. The source repo
  # is detected at runtime by deriving the owning repo from THIS image name, so
  # the installer's branding substitution can never make a client think it is the
  # source. (A hardcoded source slug here would be rewritten to the client's slug
  # at install time, making every client rebuild its own base -- the exact bug
  # this avoids.)
  LCWC_BASE_IMAGE: ${{ vars.LCWC_BASE_IMAGE || 'ghcr.io/elijah286/labview-ci-with-containers-labview-base:2026' }}

permissions:
  contents: write   # also publishes the worker manifest to the gh-pages branch
  packages: write

# Serialize image builds so two rebuilds (e.g. rapid VIPC edits) never race each
# other's worker-manifest publish to gh-pages. cancel-in-progress:false so a
# queued rebuild still completes and publishes rather than being dropped.
concurrency:
  group: build-labview-windows-image
  cancel-in-progress: false

jobs:
  # Decide whether this push should actually rebuild the worker image. Auto-rebuild
  # is per monitored file: a push only rebuilds when it changes a *.vipc or
  # *.dragon that the project flagged monitor:true in .github/labview-ci.yml
  # (config.container.vipc[] / config.container.dragon[]). Manual dispatch and the
  # monthly cron always rebuild (a rebuild is the whole point of running them). Any
  # push that does not touch a monitored dependency -- and any uncertainty/error --
  # leaves the heavy build for an explicit dispatch (the dashboard banner still
  # flags that dependencies need installing), so nothing surprises the user with a
  # long build they did not ask for.
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Decide whether to rebuild
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, re, subprocess, pathlib

          def emit(build, why):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('build=%s\n' % ('true' if build else 'false'))
              print('rebuild =', build, '--', why)
              raise SystemExit(0)

          try:
              # Manual dispatch / monthly cron: the rebuild is always intended.
              if os.environ.get('EVENT_NAME', '') != 'push':
                  emit(True, 'dispatch/schedule -> always rebuild')

              before = os.environ.get('BEFORE', '') or ''
              sha = os.environ.get('SHA', '') or 'HEAD'
              # Auto-rebuild is opt-in, so on any uncertainty we do NOT build.
              if not before or set(before) == {'0'}:
                  emit(False, 'no diff base on push -> skip (opt-in)')
              diff = subprocess.run(['git', 'diff', '--name-only', before, sha],
                                    capture_output=True, text=True)
              if diff.returncode != 0:
                  emit(False, 'git diff failed -> skip (opt-in)')
              files = [f for f in diff.stdout.splitlines() if f.strip()]
              is_dep = lambda f: f.lower().endswith(('.vipc', '.dragon'))
              dep_changed = [f for f in files if is_dep(f)]
              if not dep_changed:
                  emit(False, 'no .vipc/.dragon changed -> skip')

              # Read per-file monitor flags from config.container.vipc and
              # config.container.dragon. A dependency file auto-rebuilds the worker
              # ONLY when it is explicitly monitor: true. Anything not listed, or
              # listed without monitor: true, defaults to OFF.
              monitor = {}
              cfg = pathlib.Path('.github/labview-ci.yml')
              if cfg.exists():
                  in_c = False; in_list = None; cur = None
                  for line in cfg.read_text(encoding='utf-8').splitlines():
                      if re.match(r'^container:\s*$', line):
                          in_c = True; in_list = None; cur = None; continue
                      if not in_c:
                          continue
                      if re.match(r'^\S', line):            # next top-level key
                          in_c = False; in_list = None; cur = None; continue
                      mk = re.match(r'^\s{4}(\w+):\s*$', line)
                      if mk:                                # a 4-space block key
                          in_list = mk.group(1) if mk.group(1) in ('vipc', 'dragon') else None
                          cur = None; continue
                      if re.match(r'^\s{4}\w+:\s*\S', line):  # 4-space key: value
                          in_list = None; cur = None; continue
                      if in_list:
                          m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                          if m:
                              cur = m.group(1).strip().replace('\\', '/')
                              monitor.setdefault(cur, False); continue
                          m = re.match(r'^\s{8}monitor:\s*(\S+)', line)
                          if m and cur is not None:
                              monitor[cur] = (m.group(1).strip().lower() == 'true')

              for f in dep_changed:
                  key = f.replace(os.sep, '/')
                  if monitor.get(key, False):
                      emit(True, 'monitored dependency changed: ' + f)
              emit(False, 'changed dependencies are not monitored -> skip')
          except SystemExit:
              raise
          except Exception as e:
              # Fail SAFE for an opt-in feature: never launch a heavy build on error.
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('build=false\n')
              print('gate error -> build=false:', e)
          PY

  # Before a heavy (~15+ min) worker rebuild, coordinate the CI runs that USE the
  # worker container so they do not straddle the image swap. The OLD image stays in
  # GHCR until the new one is pushed, so this is about a clean, predictable hand-off
  # and honest status -- not correctness. The policy comes from the dispatch input or
  # config.container.rebuildPolicy in .github/labview-ci.yml (default drain):
  #   drain  = wait for already-running worker jobs to finish, then rebuild.
  #   cancel = stop already-running worker jobs now, then rebuild.
  # Brand-new worker jobs are already gated by wait-for-worker-image.sh (they wait
  # for THIS build), so we only ever touch runs that started BEFORE this one, which
  # rules out a drain/wait deadlock. Best-effort: it never blocks the rebuild.
  coordinate:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write     # cancel in-flight runs (drain only needs read)
      contents: read     # read .github/labview-ci.yml for the policy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Coordinate in-flight CI before the rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_POLICY: ${{ github.event.inputs.rebuild_policy || 'config' }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY' || echo "::notice::rebuild coordination ended early (non-fatal)"
          import json, os, re, subprocess, time, pathlib

          def gh(args):
              r = subprocess.run(['gh', 'api'] + args, capture_output=True, text=True)
              return r.stdout if r.returncode == 0 else ''

          repo = os.environ.get('GITHUB_REPOSITORY', '')
          run_id = os.environ.get('RUN_ID', '')
          policy = (os.environ.get('INPUT_POLICY', 'config') or 'config').strip().lower()

          # Resolve the policy from config when the dispatch left it on "config".
          if policy in ('', 'config'):
              policy = 'drain'
              cfg = pathlib.Path('.github/labview-ci.yml')
              if cfg.exists():
                  in_c = False
                  for line in cfg.read_text(encoding='utf-8').splitlines():
                      if re.match(r'^\s*container:\s*$', line):
                          in_c = True; continue
                      if in_c:
                          m = re.match(r'^\s{4}rebuildPolicy:\s*"?([A-Za-z]+)"?', line)
                          if m:
                              policy = m.group(1).strip().lower(); break
                          if re.match(r'^\S', line):
                              in_c = False
          if policy not in ('drain', 'cancel'):
              policy = 'drain'
          print('Rebuild coordination policy:', policy)

          # Only coordinate runs that started BEFORE this build, so we never wait on
          # a worker job that is itself blocked waiting for THIS image (no deadlock).
          my_created = ''
          if repo and run_id:
              me = json.loads(gh(['repos/%s/actions/runs/%s' % (repo, run_id)]) or '{}')
              my_created = me.get('created_at', '') or ''

          def worker_runs():
              data = json.loads(gh(['repos/%s/actions/runs?per_page=100' % repo]) or '{}')
              out = []
              for r in data.get('workflow_runs', []):
                  if str(r.get('id')) == str(run_id):
                      continue
                  if 'Container' not in (r.get('name') or ''):
                      continue                       # the per-cap workers are "... Container"
                  if r.get('status') == 'completed':
                      continue
                  if my_created and (r.get('created_at', '') or '') >= my_created:
                      continue                       # newer -> gated by wait-for-worker-image
                  out.append(r)
              return out

          active = worker_runs()
          if not active:
              print('No in-flight worker-container CI to coordinate.')
              raise SystemExit(0)

          print('In-flight worker CI runs to %s (%d):' % (policy, len(active)))
          for r in active:
              print('  - %s #%s [%s]' % (r.get('name'), r.get('run_number'), r.get('status')))

          if policy == 'cancel':
              for r in active:
                  gh(['-X', 'POST', 'repos/%s/actions/runs/%s/cancel' % (repo, r.get('id'))])
                  print('Requested cancel:', r.get('name'), r.get('id'))

          # Bounded wait for the targeted runs to leave the running state. 25 min is
          # under the 30 min that downstream wait-for-worker-image allows.
          ids = [str(r.get('id')) for r in active]
          deadline = time.time() + 1500
          while time.time() < deadline:
              data = json.loads(gh(['repos/%s/actions/runs?per_page=100' % repo]) or '{}')
              by_id = {str(r.get('id')): r for r in data.get('workflow_runs', [])}
              pending = [i for i in ids if by_id.get(i, {}).get('status') not in ('completed', None)]
              if not pending:
                  print('All targeted worker CI runs have finished.')
                  break
              print('  ... waiting for %d worker run(s) to finish' % len(pending))
              time.sleep(20)
          else:
              print('Timed out coordinating in-flight CI; proceeding with the rebuild.')

          summ = os.environ.get('GITHUB_STEP_SUMMARY')
          if summ:
              with open(summ, 'a') as f:
                  f.write('### Worker rebuild coordination\n')
                  f.write('- Policy: **%s**\n' % policy)
                  f.write('- In-flight worker CI runs handled: **%d**\n' % len(active))
          PY

  build-and-push:
    needs: [gate, coordinate]
    # always(): coordination is best-effort, so a coordinate hiccup must never
    # block the actual rebuild -- only the gate decision gates the build.
    if: always() && needs.gate.outputs.build == 'true'
    # The dependency bake needs the Windows Docker daemon, so it pins to
    # windows-2022 (windows-latest = Server 2025, broken Docker daemon). The
    # install-seed COPY is a separate workflow (copy-labview-image.yml) that runs
    # on ubuntu-latest; this Build workflow only ever bakes dependencies, on Windows.
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name and date tag
        id: date
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          PAGES_URL_OVERRIDE: ${{ vars.PAGES_URL }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner}/${name}" >> "$GITHUB_ENV"
          echo "PAGES_URL=${PAGES_URL_OVERRIDE:-https://${owner}.github.io/${GITHUB_REPOSITORY##*/}}" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      # Bake any repo .vipc into the worker: copy repo-root *.vipc next to the
      # VIPM installer so the Dockerfile's existing hook applies it at build time.
      # Globbing here (rather than COPY *.vipc in the Dockerfile) handles the
      # zero-or-more case gracefully and keeps spaces-in-filename safe.
      # Stage the project VIPC files baked into the worker image. When
      # .github/labview-ci.yml lists config.container.vipc entries, exactly those
      # files are baked, so the Configure dialog can choose which dependencies apply
      # and a VIPC can live anywhere in the repo (not just the root). With no list,
      # every project *.vipc found ANYWHERE in the repo (recursively, excluding the
      # tooling dir under .github/) is baked -- VIPC files are the source of truth
      # for project dependencies, so they are all discovered and applied by default.
      - name: Stage repo VIPC and Dragon files
        id: vipc
        shell: bash
        run: |
          python - <<'PY'
          import os, re, glob, shutil, pathlib
          dest = pathlib.Path('.github/labview/vipm'); dest.mkdir(parents=True, exist_ok=True)
          cfg = pathlib.Path('.github/labview-ci.yml')

          def configured_paths(kind):
              selected = []
              saw_list = False
              cur = None
              if not cfg.exists():
                  return selected, saw_list
              in_c = False
              in_list = None
              for line in cfg.read_text(encoding='utf-8').splitlines():
                  if re.match(r'^\s*container:\s*$', line):
                      in_c = True; in_list = None; cur = None; continue
                  if not in_c:
                      continue
                  if re.match(r'^\S', line):
                      in_c = False; in_list = None; cur = None; continue
                  mk = re.match(r'^\s{4}(\w+):\s*$', line)
                  if mk:
                      in_list = kind if mk.group(1) == kind else None
                      if in_list:
                          saw_list = True
                      cur = None; continue
                  if re.match(r'^\s{4}\w+:\s*\S', line):
                      in_list = None; cur = None; continue
                  if in_list:
                      m = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                      if m:
                          cur = m.group(1).strip().replace('\\', '/')
                          continue
                      m = re.match(r'^\s{8}monitor:\s*(\S+)', line)
                      if m and cur is not None:
                          if m.group(1).strip().lower() == 'true':
                              selected.append(cur)
                          cur = None
              return selected, saw_list

          paths, saw_vipc_list = configured_paths('vipc')
          if not paths and not saw_vipc_list:
              paths = sorted(
                  p for p in glob.glob('**/*.vipc', recursive=True)
                  if not p.replace(os.sep, '/').startswith('.github/')
              )
          staged = 0
          for p in paths:
              if os.path.isfile(p):
                  shutil.copy2(p, dest / os.path.basename(p))
                  print('Staged VIPC:', p); staged += 1
              else:
                  print('Configured VIPC not found (skipping):', p)
          # Capability-scoped VIPCs (e.g. Antidoc) live under .github/labview/<cap>/
          # and are baked into the worker ONLY when that capability is installed -
          # detected by the presence of its action workflow. This keeps an add-on's
          # VIPM dependencies (and their chains) out of every worker unless the
          # functionality is actually used, so each repo applies only the
          # dependency sets it needs. New VIPM capabilities follow this pattern:
          # add .github/labview/<cap>/<cap>.vipc and a (vipc_path, signal) row here.
          capability_vipcs = [
              ('.github/labview/antidoc/antidoc.vipc', '.github/workflows/run-antidoc-windows-container.yml'),
          ]
          for vipc_path, signal in capability_vipcs:
              if os.path.isfile(vipc_path) and os.path.isfile(signal):
                  shutil.copy2(vipc_path, dest / os.path.basename(vipc_path))
                  print('Staged capability VIPC:', vipc_path); staged += 1
              elif os.path.isfile(vipc_path):
                  print('Capability VIPC present but capability not installed (skipping):', vipc_path)
          if not staged:
              print('No VIPC files to stage.')

          # Project .dragon (JKI Dragon / NIPM) declarations are handled like .vipc
          # for the worker bake, but only when monitored on the Dependencies page.
          # If no monitor list exists yet, manual dependency builds discover all
          # project .dragon files so a fresh repo can apply the default selections.
          dpaths, saw_dragon_list = configured_paths('dragon')
          if not dpaths and not saw_dragon_list:
              dpaths = sorted(
                  p for p in glob.glob('**/*.dragon', recursive=True)
                  if not p.replace(os.sep, '/').startswith('.github/')
              )
          dstaged = 0
          for p in dpaths:
              if os.path.isfile(p):
                  shutil.copy2(p, dest / os.path.basename(p))
                  print('Staged Dragon:', p); dstaged += 1
              else:
                  print('Configured Dragon not found (skipping):', p)
          if not dstaged:
              print('No Dragon files to stage.')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'count={staged}\n')
              out.write(f'dragon_count={dstaged}\n')
          PY
      - name: Ensure Docker daemon is running
        shell: powershell
        run: ./.github/labview/ensure-docker.ps1

      # crane (go-containerregistry) copies images registry-to-registry with
      # cross-repo blob mounting -- no multi-GB pull/push through the runner, and
      # no dependency on docker buildx (which is not installed on the Windows
      # runner). It authenticates from the docker config written by docker/login.
      - name: Set up crane (registry copy tool)
        # pwsh (PowerShell 7) is preinstalled on BOTH windows-2022 and
        # ubuntu-latest, so this one step provisions crane for the Windows bake
        # path and the ubuntu copy path. The release asset and binary name differ
        # per OS, so pick them from $RUNNER_OS.
        shell: pwsh
        run: |
          $ver = 'v0.20.2'
          $osName = if ($env:RUNNER_OS -eq 'Windows') { 'Windows' } else { 'Linux' }
          $url = "https://github.com/google/go-containerregistry/releases/download/$ver/go-containerregistry_${osName}_x86_64.tar.gz"
          $tgz = Join-Path $env:RUNNER_TEMP 'crane.tar.gz'
          $dir = Join-Path $env:RUNNER_TEMP 'crane'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $tgz -UseBasicParsing
          tar -xzf $tgz -C $dir
          "$dir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $craneExe = if ($env:RUNNER_OS -eq 'Windows') { Join-Path $dir 'crane.exe' } else { Join-Path $dir 'crane' }
          & $craneExe version

      - name: Prepare LCWC base image
        id: base
        shell: pwsh
        run: |
          $baseImage = '${{ env.LCWC_BASE_IMAGE }}'
          if (-not $baseImage.Contains(':')) { $baseImage = "${baseImage}:${{ env.DEFAULT_TAG }}" }
          $baseRepo = ($baseImage -replace ':[^/:]+$', '')
          # Derive the repo that OWNS this base image: ghcr.io/<owner>/<name>-labview-base
          # -> <owner>/<name>. That owning repo is the source; every other repo is a
          # client that copies the published base. Deriving the source identity from
          # the image name (instead of a hardcoded slug) makes it immune to the
          # installer's branding substitution, which would otherwise rewrite a literal
          # source slug to the client's own slug and make the client rebuild the base.
          $sourceSlug = ($baseRepo -replace '^[^/]+/', '') -replace '-labview-base$', ''
          $isSourceRepo = ('${{ github.repository }}'.ToLowerInvariant() -eq $sourceSlug.ToLowerInvariant())

          if ($isSourceRepo) {
            $baseHash = (Get-FileHash -LiteralPath '.github/docker/labview-ci-base.Dockerfile' -Algorithm SHA256).Hash.ToLower().Substring(0, 12)
            $immutableBase = "${baseRepo}:base-${baseHash}"
            Write-Host "::notice::Publishing LCWC base image $baseImage ($immutableBase). Fresh client repositories copy this image into their own GHCR package instead of reinstalling the shared LabVIEW tooling layers."
            docker build -f .github/docker/labview-ci-base.Dockerfile -t $baseImage -t $immutableBase .
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            foreach ($tag in @($baseImage, $immutableBase)) {
              Write-Host "Pushing LCWC base $tag"
              docker push $tag
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          } else {
            Write-Host "::notice::Using LCWC base image $baseImage. If this repository has no selected VIPC dependencies, the workflow will only copy/tag this image into the repository's own GHCR package."
          }

          # Resolve the base image's manifest digest WITHOUT pulling the multi-GB
          # image down to the runner -- crane reads it straight from the registry.
          # Only the VIPC-layer path (docker build FROM the base) needs the image
          # locally, and docker build pulls it then; the no-VIPC copy path never
          # downloads it at all.
          $digest = (crane digest $baseImage 2>$null)
          if (-not $digest) {
            throw "Could not read the LCWC base image '$baseImage' from the registry. Confirm the source GHCR package is public/readable or set the LCWC_BASE_IMAGE repository variable to a readable base image."
          }
          $repoDigest = "${baseRepo}@${digest}"
          "image=$baseImage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "repo_digest=$repoDigest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "digest=$digest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "LCWC base image: $baseImage  digest: $digest"

      # Worker version = short SHA-256 over the LCWC seed image plus any staged
      # repo VIPC layer inputs. Same inputs -> same immutable worker tag.
      - name: Compute worker version
        id: ver
        shell: pwsh
        run: |
          $vipcFiles = @(Get-ChildItem '.github/labview/vipm' -Filter *.vipc -File | Sort-Object Name)
          $dragonFiles = @(Get-ChildItem '.github/labview/vipm' -Filter *.dragon -File | Sort-Object Name)
          $files = @()
          if ($vipcFiles.Count -gt 0 -or $dragonFiles.Count -gt 0) {
            $files += '.github/docker/labview-ci.Dockerfile'
            $files += '.github/labview/vipm/install-vipc.ps1'
            $files += ($vipcFiles | ForEach-Object FullName)
            $files += ($dragonFiles | ForEach-Object FullName)
          }
          $parts = @(
            'lcwc-base-image=${{ steps.base.outputs.image }}',
            'lcwc-base-digest=${{ steps.base.outputs.digest }}',
            ('vipc-count={0}' -f $vipcFiles.Count),
            ('dragon-count={0}' -f $dragonFiles.Count)
          )
          $parts += foreach ($f in $files) {
            if (Test-Path -LiteralPath $f) {
              $h = (Get-FileHash -LiteralPath $f -Algorithm SHA256).Hash.ToLower()
              '{0}={1}' -f ([System.IO.Path]::GetFileName($f)), $h
            }
          }
          $bytes   = [System.Text.Encoding]::UTF8.GetBytes(($parts -join "`n"))
          $digest  = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
          $hex     = -join ($digest | ForEach-Object { $_.ToString('x2') })
          $version = 'win-' + $hex.Substring(0, 12)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Worker version: $version"

      - name: Build and push LabVIEW CI image
        shell: pwsh
        run: |
          $base  = '${{ env.IMAGE_NAME }}'
          $ver   = '${{ env.DEFAULT_TAG }}'
          $date  = '${{ steps.date.outputs.date }}'
          $wv    = '${{ steps.ver.outputs.version }}'
          $lcwcBase = '${{ steps.base.outputs.image }}'
          $vipcCount = [int]'${{ steps.vipc.outputs.count }}'
          $dragonCount = [int]'${{ steps.vipc.outputs.dragon_count }}'
          $depCount = $vipcCount + $dragonCount
          $unitTestsInstalled = $false
          $inActivities = $false
          if (Test-Path '.github/labview-ci.yml') {
            foreach ($line in (Get-Content '.github/labview-ci.yml')) {
              if ($line -match '^\s*activities:\s*$') { $inActivities = $true; continue }
              if ($inActivities) {
                if ($line -match '^\s*-\s*unit-tests\s*$') { $unitTestsInstalled = $true; break }
                if ($line -match '^\S') { $inActivities = $false }
              }
            }
          }
          $unitTestsArg = if ($unitTestsInstalled) { 'true' } else { 'false' }
          if (-not $unitTestsInstalled) {
            Write-Host "::notice::Unit Tests capability is not installed; UTF/JUnit-only VIPM essentials will be skipped for this worker build. Project VIPC dependencies remain required."
          }
          # The immutable per-content tag ($wv) sits alongside the moving tags.
          # update_mode=replace (default): rebuild the standard tags in place, so
          # actions using :latest/:<year> pick up the dependency update automatically.
          # update_mode=new: publish a NEW dated tag alongside the current container
          # WITHOUT moving :latest/:<year>, so existing actions keep the current
          # worker until a user selects the new tag per action in Configure Workers.
          $updateMode = '${{ github.event.inputs.update_mode || 'replace' }}'
          if ($updateMode -eq 'new') {
            $newTag = "${ver}-deps-${date}"
            $tags = @("${base}:${wv}", "${base}:${newTag}")
          } else {
            $tags = @("${base}:${ver}", "${base}:${ver}-${date}", "${base}:${wv}", "${base}:latest")
          }

          if ($depCount -eq 0) {
            Write-Host "::notice::No repository VIPC/Dragon dependencies to bake; refreshing the worker as a registry copy of the LCWC base (crane copy). The fast fresh-install seed is the separate 'Copy LabVIEW CI Image' workflow on ubuntu-latest -- this Build workflow runs on Windows for the dependency bake."
            $immutable = "${base}:${wv}"
            crane copy $lcwcBase $immutable
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            foreach ($tag in @($ver, "${ver}-${date}", 'latest')) {
              crane tag $immutable $tag
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              Write-Host "Published (registry copy): ${base}:${tag}"
            }
            Write-Host "Published (registry copy): $immutable"
          } else {
            Write-Host "::notice::$depCount repository dependency file(s) selected ($vipcCount VIPC, $dragonCount Dragon). Building the repo-specific dependency layer now; this can take a long time because VIPM must apply project dependencies before CI can run on the updated worker."
            $tagFlags = ($tags | ForEach-Object { "-t", $_ })
            $repoUrl = '${{ github.server_url }}/${{ github.repository }}.git'
            docker build -f .github/docker/labview-ci.Dockerfile `
              --build-arg LCWC_BASE_IMAGE=$lcwcBase `
              --build-arg CI_WORKER_VERSION=$wv `
              --build-arg VIPM_PUBLIC_REPO_URL=$repoUrl `
              --build-arg LVCI_UNIT_TESTS_INSTALLED=$unitTestsArg @tagFlags .
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            foreach ($tag in $tags) {
              Write-Host "Pushing $tag"
              docker push $tag
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            if ($updateMode -eq 'new') {
              Write-Host "::notice::Published a NEW worker tag '${base}:${newTag}' alongside the current container. Select it per action in Configure Workers; existing actions keep using the current :latest / :${ver} worker until you switch them."
            }
          }

      # Capture what's installed and render the human/machine worker manifest.
      # All of this is best-effort: a hiccup here must not fail an otherwise good
      # image build (the image is already pushed by this point).
      - name: Generate worker manifest
        shell: pwsh
        run: |
          $base   = '${{ env.IMAGE_NAME }}'
          $wv     = '${{ steps.ver.outputs.version }}'
          $img    = "${base}:${wv}"
          $workerLayer = if (([int]'${{ steps.vipc.outputs.count }}' + [int]'${{ steps.vipc.outputs.dragon_count }}') -gt 0) { 'repo-vipc-layer' } else { 'seed-only-copy' }
          $outDir = "ci-out/workers-pages/workers/windows/$wv"
          New-Item -ItemType Directory -Force -Path 'ci-out/worker' | Out-Null
          New-Item -ItemType File -Force -Path 'ci-out/worker/nipkg-list.txt','ci-out/worker/vipm-list.txt' | Out-Null

          # Installed-package list captured from inside the freshly built image.
          # A seed-only copy is byte-identical to the LCWC base and is NOT present on
          # the runner (it was copied at the registry level), so pulling it back just
          # to read nipkg would re-download multiple gigabytes. Skip it on the copy
          # path; the VIPC-layer path already has the image locally from docker build.
          if ($workerLayer -eq 'repo-vipc-layer') {
            try {
              docker run --rm $img powershell -NoLogo -NoProfile -Command "nipkg list" 2>$null |
                Out-File -FilePath 'ci-out/worker/nipkg-list.txt' -Encoding utf8
            } catch { Write-Host "nipkg list capture failed: $_" }
            try {
              docker run --rm $img powershell -NoLogo -NoProfile -Command "& 'C:\Program Files\JKI\VI Package Manager\support\vipm.exe' --labview-version ${{ vars.LABVIEW_VERSION || '2026' }} --labview-bitness 64 list --installed" 2>$null |
                Out-File -FilePath 'ci-out/worker/vipm-list.txt' -Encoding utf8
            } catch { Write-Host "VIPM list capture failed: $_" }
          } else {
            Write-Host "Seed-only copy: the worker mirrors the LCWC base; skipping installed-package capture to avoid a multi-gigabyte pull."
          }

          $baseDigest = '${{ steps.base.outputs.digest }}'

          $vipcArgs = @()
          Get-ChildItem '.github/labview/vipm' -Filter *.vipc -File |
            ForEach-Object { $vipcArgs += @('--vipc', $_.FullName) }

          python .github/labview/build-worker-manifest.py `
            --platform windows `
            --version $wv `
            --nipkg-list 'ci-out/worker/nipkg-list.txt' `
            --vipm-list 'ci-out/worker/vipm-list.txt' `
            --labview-version ${{ vars.LABVIEW_VERSION || '2026' }} `
            --pages-url '${{ env.PAGES_URL }}' `
            --base-image '${{ steps.base.outputs.image }}' `
            --base-digest "$baseDigest" `
            --seed-image '${{ steps.base.outputs.image }}' `
            --seed-digest "$baseDigest" `
            --worker-layer $workerLayer `
            --image-ref $img `
            --git-sha '${{ github.sha }}' `
            --run-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' `
            --out-dir $outDir `
            @vipcArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # latest.json pointer for "current Windows worker".
          $latest = [ordered]@{
            version      = $wv
            platform     = 'windows'
            manifest_url = "${{ env.PAGES_URL }}/workers/windows/$wv/manifest.html"
            build_date   = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            git_sha      = '${{ github.sha }}'
          }
          $latest | ConvertTo-Json |
            Out-File -FilePath 'ci-out/workers-pages/workers/windows/latest.json' -Encoding utf8

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        shell: bash
        run: |
          # peaceiris clones the whole gh-pages branch (deeply nested VIDiff paths)
          # on the Windows runner; long-path support avoids "Filename too long".
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Publish worker manifest to GitHub Pages
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/workers-pages
          commit_message: Publish Windows worker manifest
      - name: Summary
        shell: bash
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ steps.date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\` (immutable worker tag)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Worker version:** \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "[Worker manifest](${{ env.PAGES_URL }}/workers/windows/${{ steps.ver.outputs.version }}/manifest.html)" >> "$GITHUB_STEP_SUMMARY"
