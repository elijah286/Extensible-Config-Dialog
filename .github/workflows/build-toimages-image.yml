name: Build VI Browser 2.0 render image

# Builds the in-place VI Browser 2.0 render engine (the vendored "toimages" engine
# under .github/labview/toimages) into a container image and publishes it to THIS
# repository's OWN GHCR using the built-in GITHUB_TOKEN - no personal access token
# and no external private image. The render workflow (vi-snapshots-json.yml) pulls
# it with the same GITHUB_TOKEN, so VI Browser 2.0 works with zero token setup.
#
# The image layers the render engine on the public nationalinstruments/labview
# Linux base, so the build is heavy; it runs when the engine changes, on a monthly
# schedule (NI base-image security updates), or on demand.

on:
  push:
    branches: [master]
    paths:
      - '.github/labview/toimages/**'
      - '.github/workflows/build-toimages-image.yml'
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-toimages-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve image name (this repo's own GHCR, lowercased)
        id: img
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr 'A-Z' 'a-z')
          repo=$(printf '%s' "${{ github.event.repository.name }}" | tr 'A-Z' 'a-z')
          echo "image=ghcr.io/${owner}/${repo}-toimages" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.img.outputs.image }}:latest" \
            -t "${{ steps.img.outputs.image }}:${{ github.sha }}" \
            .github/labview/toimages

      - name: Push image
        run: |
          docker push "${{ steps.img.outputs.image }}:latest"
          docker push "${{ steps.img.outputs.image }}:${{ github.sha }}"

      - name: Summary
        run: |
          {
            echo "Pushed \`${{ steps.img.outputs.image }}:latest\`"
            echo ""
            echo "VI Browser 2.0's render workflow pulls this image with the built-in GITHUB_TOKEN - no token setup needed."
          } >> "$GITHUB_STEP_SUMMARY"
