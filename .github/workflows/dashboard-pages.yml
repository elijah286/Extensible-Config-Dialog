# CI Dashboard — GitHub Pages. Thin caller installed by the LabVIEW CI configurator.
# The dashboard build logic lives in the shared composite action, pulled at the tooling
# version this repo opted into (.github/labview-ci.yml: source.ref) and checked out at
# runtime — so this repo keeps no copy of the generator and the dashboard updates only
# when you opt in. Owns the triggers + the Pages deploy.
name: CI Dashboard — GitHub Pages

on:
  # Build on the install merge + whenever the config changes, so the dashboard
  # publishes itself the first time without waiting for the hourly schedule.
  push:
    branches: [master]
    paths:
      - '.github/labview-ci.yml'
      - '.github/workflows/dashboard-pages.yml'
  workflow_run:
    workflows:
      - "Mass Compile — Windows Container"
      - "Mass Compile Backfill — Windows Container"
      - "Run VI Analyzer — Windows Container"
      - "Run VI Analyzer — Linux Container"
      - "VIDiff Report — Windows Container"
      - "VIDiff Report — Linux Container"
      - "VIDiff Deploy — Pages + PR Comment"
      - "VI Snapshots and VI Browser"
    types: [completed]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: dashboard-pages
  cancel-in-progress: true

permissions:
  contents: write
  statuses: read
  actions: read

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read opted-in tooling ref from config
        id: cfg
        shell: bash
        run: |
          REF=$(awk '/^[[:space:]]*ref:[[:space:]]/{print $2; exit}' .github/labview-ci.yml 2>/dev/null)
          echo "ref=${REF:-v3.38.5}" >> "$GITHUB_OUTPUT"
      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v5
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ steps.cfg.outputs.ref }}
          path: _lvci
      - name: Build CI dashboard
        uses: ./_lvci/actions/dashboard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ci-out/dashboard
          destination_dir: .
          keep_files: true
