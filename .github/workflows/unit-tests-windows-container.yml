name: Run Unit Tests — Windows Container

# Runs the configured LabVIEW unit-test frameworks (Caraya / VI Tester / UTF)
# headlessly inside the project's CI worker image, normalises their JUnit XML into
# one friendly report (build-unittest-report.py), deploys it under
# unit-tests/<sha>/, and posts the "CI / Unit Tests" commit status the dashboard
# column reads. Mirrors run-vi-analyzer-windows-container.yml so the two activities
# behave identically (per-action container selection, Run-now dispatch, framed
# report). Manual runs come through workflow_dispatch (the dashboard's Run-now).

on:
  # Auto-runs only on real LabVIEW source changes — never on the tooling files an
  # install/deploy adds (e.g. .github/labview-ci.yml), so deploying the pipeline or
  # changing the config never kicks off a unit-test run. Use the dashboard's "Run
  # all history" prompt or workflow_dispatch to run on demand.
  pull_request:
    paths:
      - '**.vi'
      - '**.lvclass'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvtest'
      - '!.github/**'
  push:
    branches: [master]
    paths:
      - '**.vi'
      - '**.lvclass'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvtest'
      - '!.github/**'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to test (leave blank for current HEAD)'
        required: false
        default: ''

env:
  # Resolved + lowercased at runtime (GHCR rejects upper-case names); declared
  # empty so it is always a defined key. Override with vars.LABVIEW_IMAGE_NAME /
  # LABVIEW_VERSION.
  LABVIEW_CONTAINER_IMAGE: ''
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pages: write
  statuses: write
  packages: read
  actions: read   # so wait-for-worker-image.sh can read the worker-image build runs

# Share the report-deploy concurrency group with the other report workflows so
# gh-pages pushes queue instead of racing (a loser's push bounces with
# "fetch first" and its report never deploys).
concurrency:
  group: report-pages-deploy
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: windows-2022   # windows-latest = Server 2025, broken Docker daemon

    steps:
      - name: Determine target SHA
        id: sha
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.commit_sha }}"
          if [ -n "$INPUT" ]; then
            FULL=$(gh api "repos/${{ github.repository }}/commits/$INPUT" --jq '.sha')
            echo "sha=$FULL" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"Unit tests in progress\",\"context\":\"CI / Unit Tests\"}"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        shell: bash
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git checkout FETCH_HEAD -- .github/labview .github/workflows

      # Per-action container selection: config.container.actions.unit-tests wins,
      # then config.container.use. With neither set, default to the shared custom
      # worker image at :latest. "base" forces the bare NI image; "latest"/"<tag>" select
      # that tag of the custom worker image.
      - name: Resolve container image name
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          BASE_IMAGE: nationalinstruments/labview:latest-windows
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          custom="ghcr.io/${owner}/${name}"
          ACTION_ID="unit-tests"
          CFG=.github/labview-ci.yml
          sel=""
          if [ -f "$CFG" ]; then
            sel=$(awk -v act="$ACTION_ID" '
              /^[[:space:]]*container:[[:space:]]*$/ {inc=1; ina=0; next}
              inc && /^    actions:[[:space:]]*$/ {ina=1; next}
              ina && /^      [A-Za-z0-9_.-]+:/ {
                k=$1; sub(/:.*/,"",k);
                v=$0; sub(/^[[:space:]]*[A-Za-z0-9_.-]+:[[:space:]]*/,"",v); gsub(/"/,"",v); gsub(/[[:space:]]/,"",v);
                if (k==act) {print v; exit}
                next
              }
              ina && /^    [A-Za-z]/ {ina=0}
              inc && /^[^[:space:]]/ {inc=0; ina=0}
            ' "$CFG" | tr -d '[:space:]')
            if [ -z "$sel" ]; then
              sel=$(awk '
                /^[[:space:]]*container:[[:space:]]*$/ {inc=1; next}
                inc && /^    use:/ {sub(/^[[:space:]]*use:[[:space:]]*/,""); gsub(/"/,""); print; exit}
                inc && /^[^[:space:]]/ {inc=0}
              ' "$CFG" | tr -d '[:space:]')
            fi
          fi
          if [ -z "$sel" ]; then
            img="${custom}:latest"
          elif [ "$sel" = "base" ] || [ "$sel" = "none" ]; then
            img="${BASE_IMAGE}"
          elif [ "$sel" = "latest" ]; then
            img="${custom}:latest"
          else
            img="${custom}:${sel}"
          fi
          echo "LABVIEW_CONTAINER_IMAGE=${img}" >> "$GITHUB_ENV"
          echo "Resolved container image: ${img}"

      - name: Ensure Docker daemon is running
        shell: powershell
        run: ./.github/labview/ensure-docker.ps1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # If this push changed the worker image inputs, wait for "Build LabVIEW CI
      # Image" to finish so tests run on the freshly-built worker. Bounded /
      # best-effort; does nothing when no worker-affecting file changed.
      - name: Wait for worker image build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/labview/wait-for-worker-image.sh "${{ steps.sha.outputs.sha }}" "${{ github.event.before }}"

      - name: Pull LabVIEW container image
        id: pull
        shell: powershell
        run: docker pull $Env:LABVIEW_CONTAINER_IMAGE
        continue-on-error: true

      - name: Read worker version
        id: worker
        if: steps.pull.outcome == 'success'
        shell: powershell
        run: |
          $img = $Env:LABVIEW_CONTAINER_IMAGE
          $wv = ''
          try {
            $info = docker inspect $img 2>$null | ConvertFrom-Json
            if ($info) { $wv = [string]$info[0].Config.Labels.'com.cotc.ci-worker.version' }
          } catch {}
          if (-not $wv -or $wv -eq '<no value>') { $wv = '' }
          "version=$wv" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Worker version: $wv"
          exit 0

      - name: Run unit tests inside container
        if: steps.pull.outcome == 'success'
        shell: powershell
        id: run
        run: |
          docker run --rm `
            -e "GITHUB_REPOSITORY=${{ github.repository }}" `
            -v "${{ github.workspace }}:C:\workspace" `
            $Env:LABVIEW_CONTAINER_IMAGE `
            powershell -NonInteractive -ExecutionPolicy Bypass `
              -File "C:\workspace\.github\labview\run-unit-tests.ps1" `
              -WorkspaceRoot  "C:\workspace" `
              -ResultsDir     "C:\workspace\ci-out\unit-tests\results" `
              -LabVIEWVersion "${{ vars.LABVIEW_VERSION || '2026' }}" `
              -LabVIEWPath    "C:\Program Files\National Instruments\LabVIEW ${{ vars.LABVIEW_VERSION || '2026' }}\LabVIEW.exe"
        continue-on-error: true

      - name: Build friendly report (merge JUnit + join snapshots)
        id: report
        if: steps.pull.outcome == 'success'
        shell: bash
        continue-on-error: true
        run: |
          # Merge every per-tool JUnit XML into one navigable report whose failing
          # tests deep-link the VI under test into the VI Browser. Always runs
          # (even with zero results: it renders an explicit "no tests found" page).
          OUT="${{ github.workspace }}/ci-out/unit-tests"
          python .github/labview/build-unittest-report.py \
            --results   "$OUT/results" \
            --out       "$OUT" \
            --workspace "${{ github.workspace }}" \
            --sha       "${{ steps.sha.outputs.sha }}" \
            --platform  windows \
            --repo      "${{ github.repository }}" \
            --pages-url "${{ env.PAGES_URL }}" \
            --labview-version "${{ vars.LABVIEW_VERSION || '2026' }}" \
            --commit-msg "$(git log -1 --pretty=%s   ${{ steps.sha.outputs.sha }})" \
            --author     "$(git log -1 --pretty=%an  ${{ steps.sha.outputs.sha }})" \
            --date       "$(git log -1 --pretty=%cI  ${{ steps.sha.outputs.sha }})"
          if [ -f "$OUT/index.html" ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload report artifact
        if: steps.report.outputs.exists == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: unit-tests-report-${{ steps.sha.outputs.sha }}
          path: ${{ github.workspace }}/ci-out/unit-tests/
          if-no-files-found: warn

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        if: steps.report.outputs.exists == 'true'
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Deploy report to GitHub Pages
        if: steps.report.outputs.exists == 'true'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/ci-out/unit-tests
          destination_dir: unit-tests/${{ steps.sha.outputs.sha }}
          keep_files: true

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT="${{ github.workspace }}/ci-out/unit-tests"
          STATE="failure"; DESC="Unit tests did not run"
          if [ "${{ steps.report.outputs.exists }}" = "true" ] && [ -f "$OUT/results.json" ]; then
            REPORT_URL="${{ env.PAGES_URL }}/unit-tests/${{ steps.sha.outputs.sha }}/index.html"
            # Derive pass/fail from the report's own summary (results.json) so the
            # status matches exactly what the report shows (mirrors Mass Compile).
            tests=$(jq -r '.summary.tests // 0'   "$OUT/results.json")
            passed=$(jq -r '.summary.passed // 0' "$OUT/results.json")
            failed=$(jq -r '((.summary.failed // 0) + (.summary.errored // 0))' "$OUT/results.json")
            if [ "${tests:-0}" -eq 0 ]; then
              STATE="success"; DESC="No unit tests found"
            elif [ "${failed:-0}" -eq 0 ]; then
              STATE="success"; DESC="${passed} passed"
            else
              STATE="failure"; DESC="${failed} failed, ${passed} passed"
            fi
          elif [ "${{ steps.report.outputs.exists }}" = "true" ]; then
            REPORT_URL="${{ env.PAGES_URL }}/unit-tests/${{ steps.sha.outputs.sha }}/index.html"
          else
            REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$REPORT_URL\",\"description\":\"$DESC\",\"context\":\"CI / Unit Tests\"}"

      - name: Post worker version status
        if: always() && steps.pull.outcome == 'success' && steps.worker.outputs.version != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WV="${{ steps.worker.outputs.version }}"
          URL="${{ env.PAGES_URL }}/workers/windows/${WV}/manifest.html"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"success\",\"target_url\":\"$URL\",\"description\":\"$WV\",\"context\":\"CI / Worker (windows)\"}"
