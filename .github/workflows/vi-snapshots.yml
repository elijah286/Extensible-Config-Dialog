name: VI Snapshots and VI Browser

on:
  # Auto-runs only on real LabVIEW source changes — never on the tooling files an
  # install/deploy adds, so deploying the pipeline never kicks off a snapshot run.
  # Re-render after a script/tooling update from the dashboard's "Run all history"
  # prompt or workflow_dispatch.
  push:
    branches: [master]
    paths:
      - '**.vi'
      - '**.ctl'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvclass'
  workflow_dispatch:
    inputs:
      mode:
        description: "head = current commit only; backfill = walk history oldest→newest"
        type: choice
        options: [head, backfill]
        default: head
      max_commits:
        description: "backfill: cap to most recent N VI-touching commits (0 = all)"
        required: false
        default: '0'
      max_vis:
        description: "smoke test: cap NEW VIs rendered per commit (0 = all)"
        required: false
        default: '0'
      time_budget_minutes:
        description: "backfill: stop launching new renders after N minutes (resume next run)"
        required: false
        default: '300'

concurrency:
  group: vi-snapshots-${{ github.ref }}
  cancel-in-progress: true

env:
  LABVIEW_CONTAINER_IMAGE: ''
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pages: write
  statuses: write
  packages: read
  actions: read   # so wait-for-worker-image.sh can read the worker-image build runs

jobs:
  export-snapshots:
    runs-on: windows-2022   # windows-latest = Server 2025, broken Docker daemon
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history: backfill + per-commit worktrees

      # Seed the set of already-rendered snapshots so we never re-render a VI
      # whose content (git blob) has already been captured. Sparse-checkout keeps
      # this cheap — we only need the by-blob file listing.
      - name: Checkout deployed gallery (gh-pages) for incremental seeding
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: _pages
          sparse-checkout: vi-snapshots/by-blob
          sparse-checkout-cone-mode: false

      - name: Resolve container image name
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          BASE_IMAGE: nationalinstruments/labview:latest-windows
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          custom="ghcr.io/${owner}/${name}"
          ACTION_ID="snapshots"
          CFG=.github/labview-ci.yml
          sel=""
          if [ -f "$CFG" ]; then
            sel=$(awk -v act="$ACTION_ID" '
              /^[[:space:]]*container:[[:space:]]*$/ {inc=1; ina=0; next}
              inc && /^    actions:[[:space:]]*$/ {ina=1; next}
              ina && /^      [A-Za-z0-9_.-]+:/ {
                k=$1; sub(/:.*/,"",k);
                v=$0; sub(/^[[:space:]]*[A-Za-z0-9_.-]+:[[:space:]]*/,"",v); gsub(/"/,"",v); gsub(/[[:space:]]/,"",v);
                if (k==act) {print v; exit}
                next
              }
              ina && /^    [A-Za-z]/ {ina=0}
              inc && /^[^[:space:]]/ {inc=0; ina=0}
            ' "$CFG" | tr -d '[:space:]')
            if [ -z "$sel" ]; then
              sel=$(awk '
                /^[[:space:]]*container:[[:space:]]*$/ {inc=1; next}
                inc && /^    use:/ {sub(/^[[:space:]]*use:[[:space:]]*/,""); gsub(/"/,""); print; exit}
                inc && /^[^[:space:]]/ {inc=0}
              ' "$CFG" | tr -d '[:space:]')
            fi
          fi
          if [ -z "$sel" ]; then
            img="${custom}:latest"
          elif [ "$sel" = "base" ] || [ "$sel" = "none" ]; then
            img="${BASE_IMAGE}"
          elif [ "$sel" = "latest" ]; then
            img="${custom}:latest"
          else
            img="${custom}:${sel}"
          fi
          echo "LABVIEW_CONTAINER_IMAGE=${img}" >> "$GITHUB_ENV"
          echo "Resolved container image: ${img}"

      - name: Ensure Docker daemon is running
        shell: powershell
        run: ./.github/labview/ensure-docker.ps1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"VI Snapshots in progress\",\"context\":\"CI / VI Snapshots\"}"

      - name: Resolve VI Browser 2.0 (Windows) setting from config
        id: vbcfg
        shell: bash
        run: |
          # config.viBrowser.positionAware in .github/labview-ci.yml decides whether
          # this Windows run also emits the position-aware VI Browser 2.0 frames JSON
          # (the PrintToImagesJson op). Default (no config) = emit, preserving prior
          # behaviour. The VI Browser tab on the Configure page writes this setting.
          emit=true
          cfg=.github/labview-ci.yml
          if [ -f "$cfg" ]; then
            pa=$(sed -n 's/^[[:space:]]*positionAware:[[:space:]]*//p' "$cfg" | head -1 | tr -d '[:space:]')
            if [ -n "$pa" ]; then
              if printf '%s' "$pa" | tr '+' '\n' | grep -qx 'windows'; then emit=true; else emit=false; fi
            fi
          fi
          echo "emit_frames_json=$emit" >> "$GITHUB_OUTPUT"
          echo "VI Browser 2.0 frames JSON on Windows: $emit"

      - name: Wait for worker image build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/labview/wait-for-worker-image.sh "${{ github.sha }}" "${{ github.event.before }}"

      - name: Build VI snapshots (incremental, content-addressed)
        id: snapshots
        shell: powershell
        run: |
          & .github\labview\build-snapshots.ps1 `
            -Mode              '${{ github.event.inputs.mode || 'head' }}' `
            -WorkspaceRoot     '${{ github.workspace }}' `
            -TargetSha         '${{ github.sha }}' `
            -OutDir            '${{ github.workspace }}\ci-out\vi-snapshots' `
            -ExistingByBlobDir '${{ github.workspace }}\_pages\vi-snapshots\by-blob' `
            -Image             "$Env:LABVIEW_CONTAINER_IMAGE" `
            -MaxCommits        ${{ github.event.inputs.max_commits || '0' }} `
            -MaxVIs            ${{ github.event.inputs.max_vis || '0' }} `
            -TimeBudgetMinutes ${{ github.event.inputs.time_budget_minutes || '300' }} `
            -EmitFramesJson    '${{ steps.vbcfg.outputs.emit_frames_json }}'
        continue-on-error: true

      - name: Verify gallery output
        id: verify
        shell: bash
        run: |
          if [ -f ci-out/vi-snapshots/commits.json ] && [ -d ci-out/vi-snapshots/by-blob ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy snapshots to GitHub Pages
        if: steps.verify.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/ci-out/vi-snapshots
          destination_dir: vi-snapshots
          keep_files: true   # preserve previously-rendered by-blob snapshots

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_URL="${{ env.PAGES_URL }}/vi-snapshots/index.html"
          if [ "${{ steps.snapshots.outcome }}" = "success" ] && [ "${{ steps.verify.outputs.ok }}" = "true" ]; then
            STATE="success"
          else
            STATE="failure"
          fi
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$REPORT_URL\",\"description\":\"VI Snapshots $STATE\",\"context\":\"CI / VI Snapshots\"}"

      - name: Fail job if snapshots failed
        if: steps.snapshots.outcome != 'success' || steps.verify.outputs.ok != 'true'
        run: exit 1


