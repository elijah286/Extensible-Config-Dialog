# VI Snapshots JSON (in-place VI Browser 2.0)
#
# It pulls THIS repository's OWN toimages render image - built from the vendored
# engine under .github/labview/toimages by the "Build VI Browser 2.0 render image"
# workflow and published to this repo's GHCR with the built-in GITHUB_TOKEN - runs
# it to emit position-aware <blob>.json next to each existing <blob>.html, and
# deploys to gh-pages. The in-place 2.0 view lights up for any VI that gets a JSON;
# everything else falls back to the 1.0 flat view.
#
# NO token setup is required: the image is pulled with the built-in GITHUB_TOKEN.
# Override the image with the optional Actions variable TOIMAGES_IMAGE. Until the
# image has been built, this workflow skips gracefully and VI Browser stays on 1.0.
#
# CONTRACT the private image MUST honor when run (this is its entire interface):
#   mounts:  /work  = repo worktree, read-only   |   /out = output dir, writable
#   env:     WORKSPACE   = /work
#            WORKLIST    = path to a TSV of "<blob>\t<relpath>" lines (under /out)
#            OUT_BY_BLOB = /out/by-blob
#   action:  the image's own entrypoint starts Xvfb + LabVIEW + lv_listener, then
#            for each worklist line runs Convert.vi with "VI Path in" =
#            $WORKSPACE/<relpath> and writes "JSON out" (UTF-8, no BOM) to
#            $OUT_BY_BLOB/<blob[0:2]>/<blob>.json. Missing/failed VIs are skipped
#            (no JSON => that VI simply stays on the 1.0 view).

name: VI Snapshots JSON

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "head = the current commit's VIs; backfill = re-enumerate all VIs"
        type: choice
        options: [head, backfill]
        default: head
      target_sha:
        description: "Commit SHA whose VIs should be rendered in head mode; blank = the dispatched ref's HEAD"
        required: false
        default: ""
  workflow_run:
    workflows: ["VI Snapshots and VI Browser"]
    types: [completed]

concurrency:
  group: vi-snapshots-json-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  # Auto-runs (workflow_run) honour the VI Browser config: 2.0 on Linux is the
  # experimental toimages render (known diagram-capture display bugs), so it runs
  # automatically only when config.viBrowser.positionAware includes "linux". A
  # manual dispatch always runs. Default (no config / no viBrowser block) = run,
  # preserving prior behaviour. The VI Browser tab on Configure writes this setting.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Check out the config only
        uses: actions/checkout@v5
        with:
          sparse-checkout: .github/labview-ci.yml
          sparse-checkout-cone-mode: false
      - name: Decide whether to run
        id: decide
        run: |
          run=true
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            cfg=.github/labview-ci.yml
            if [ -f "$cfg" ]; then
              pa=$(sed -n 's/^[[:space:]]*positionAware:[[:space:]]*//p' "$cfg" | head -1 | tr -d '[:space:]')
              if [ -n "$pa" ]; then
                if printf '%s' "$pa" | tr '+' '\n' | grep -qx 'linux'; then run=true; else run=false; fi
              fi
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "VI Browser 2.0 on Linux auto-run: $run (event=${{ github.event_name }})"

  export-json:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Resolve the render image (this repo's own GHCR; override with the TOIMAGES_IMAGE variable)
        id: img
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr 'A-Z' 'a-z')
          repo=$(printf '%s' "${{ github.event.repository.name }}" | tr 'A-Z' 'a-z')
          fallback="ghcr.io/${owner}/${repo}-toimages:latest"
          override="${{ vars.TOIMAGES_IMAGE }}"
          if [ -n "$override" ]; then
            echo "image=$override" >> "$GITHUB_OUTPUT"
          else
            echo "image=$fallback" >> "$GITHUB_OUTPUT"
          fi
          echo "fallback=$fallback" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (built-in token - no setup required)
        run: echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Pull the render image (skip gracefully until it has been built)
        id: pull
        run: |
          IMG='${{ steps.img.outputs.image }}'
          FALLBACK='${{ steps.img.outputs.fallback }}'
          if docker pull "$IMG"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "image=$IMG" >> "$GITHUB_OUTPUT"
            echo "Using $IMG"
          else
            echo "::warning::Render image $IMG could not be pulled. Falling back to $FALLBACK."
            if [ "$IMG" != "$FALLBACK" ] && docker pull "$FALLBACK"; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              echo "image=$FALLBACK" >> "$GITHUB_OUTPUT"
              echo "Using fallback $FALLBACK"
            else
              echo "ok=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Render image $FALLBACK is not available yet - run 'Build VI Browser 2.0 render image' first. The VI Browser uses the 1.0 view until then."
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "::error::No pullable VI Browser 2.0 render image was available for this manual run."
                exit 1
              fi
            fi
          fi

      - name: Checkout repository
        if: steps.pull.outputs.ok == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout deployed gallery (gh-pages) for incremental seed + live publish
        if: steps.pull.outputs.ok == 'true'
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: _ghp
          sparse-checkout: vi-snapshots
          sparse-checkout-cone-mode: false

      - name: Render <blob>.json across commits (backfill-aware) + incremental publish
        if: steps.pull.outputs.ok == 'true'
        env:
          WS: ${{ github.workspace }}
          # workflow_dispatch passes mode and target_sha; workflow_run has none -> dispatched ref HEAD.
          MODE: ${{ github.event.inputs.mode || 'head' }}
          TARGET_SHA: ${{ github.event.inputs.target_sha || github.sha }}
          IMAGE: ${{ steps.pull.outputs.image }}
          OUT: ${{ github.workspace }}/ci-out/vi-snapshots
          GHP: ${{ github.workspace }}/_ghp
        run: |
          mkdir -p ci-out/vi-snapshots/by-blob
          bash .github/labview/run-toimages.sh

      - name: Verify JSON output
        id: verify
        if: steps.pull.outputs.ok == 'true'
        run: |
          n=$(find ci-out/vi-snapshots/by-blob -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "Generated $n JSON file(s)."
          if [ "$n" -gt 0 ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; else echo "ok=false" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy JSON to GitHub Pages (preserves existing HTML + JSON)
        if: steps.pull.outputs.ok == 'true' && steps.verify.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/ci-out/vi-snapshots
          destination_dir: vi-snapshots
          keep_files: true
