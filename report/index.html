<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CI Report — LabVIEW-CI-with-Containers</title>
  <!--
    Framed report viewer. The CI Dashboard opens its per-revision reports (Mass
    Compile, VI Analyzer) here so each one loads *inside* the shared header
    chrome — same nav, a Revision picker, and a Regenerate / Re-run button —
    instead of as a bare full-page report. Reports that predate the header (or
    have none of their own) therefore still appear inside the chrome. The report
    is shown in an iframe; the shared header suppresses its own copy inside that
    iframe, so there is exactly one chrome bar.

    Query params (all optional except src):
      src      — RELATIVE, same-origin path to the report to embed,
                 e.g. "../masscompile/<sha>/index.html". Absolute URLs, scheme
                 URLs and protocol-relative ("//host") values are rejected so the
                 frame can only ever load first-party content from this Pages site.
      type     — document type: "masscompile-report" or "vi-analyzer-report".
                 Drives the header's Regenerate action + revision picker. An
                 unknown/absent type still frames the report under a plain header.
      sha      — commit SHA (full) for the embedded report.
      short    — short SHA / label for the revision.
      platform — "windows" | "linux" (which workflow Regenerate dispatches).
      title    — document title for the browser tab.
  -->
  <script>
    // Configure the shared header BEFORE it loads (it is deferred). The header
    // reads window.LVCI; pointing its context at the embedded report's document
    // type makes it render that report's chrome (nav + Revision picker +
    // Regenerate), and `embedded` makes the picker re-frame THIS viewer when the
    // revision changes. Query values are validated exactly like the iframe src.
    (function () {
      var p = new URLSearchParams(location.search);
      var safeRel = function (raw) {
        if (!raw) return '';
        var s; try { s = decodeURIComponent(raw); } catch (e) { return ''; }
        if (/^[a-z][a-z0-9+.\-]*:/i.test(s)) return '';   // scheme:
        if (s.indexOf('//') === 0) return '';             // protocol-relative
        if (s.charAt(0) === '/') return '';               // root-absolute
        return s;
      };
      var dec = function (raw, fb) { if (!raw) return fb; try { return decodeURIComponent(raw); } catch (e) { return fb; } };
      var KNOWN = { 'masscompile-report': 1, 'vi-analyzer-report': 1, 'unit-tests-report': 1, 'antidoc-report': 1 };
      var type = dec(p.get('type'), '');
      window.LVCI = {
        context: KNOWN[type] ? type : 'report-viewer',
        sha: dec(p.get('sha'), ''),
        short: dec(p.get('short'), ''),
        platform: dec(p.get('platform'), ''),
        embedded: true,
        framedSrc: safeRel(p.get('src')),
        framedTitle: dec(p.get('title'), 'CI Report')
      };
    })();
  </script>
  <script src="../lvci-header.js" defer></script>
  <style>
    :root{
      --bg:#0d1117;--surface:#161b22;--border:#30363d;
      --fg:#e6edf3;--fg-muted:#8b949e;--link:#58a6ff;
    }
    @media(prefers-color-scheme:light){
      :root{
        --bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;
        --fg:#1f2328;--fg-muted:#57606a;--link:#0969da;
      }
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    a{color:var(--link);text-decoration:none}
    a:hover{text-decoration:underline}
    /* The shared header (lvci-header.js) is the chrome; the iframe fills the
       rest of the viewport beneath it. */
    iframe{flex:1 1 auto;width:100%;border:0;background:var(--bg)}
    .err{margin:auto;padding:40px;text-align:center;color:var(--fg-muted)}
    .err h1{margin:0 0 10px;color:var(--fg);font-size:1.45em}
    .err .btn{display:inline-block;margin:8px 6px 0;padding:9px 18px;border-radius:8px;background:#2da44e;color:#fff;text-decoration:none;font-weight:700}
    .err .link{display:inline-block;margin:8px 6px 0;color:var(--link);font-weight:700}
  </style>
</head>
<body>
  <iframe id="frame" title="CI report"></iframe>
  <div class="err" id="err" hidden>
    No report selected. <a href="../">Return to the CI Dashboard</a>.
  </div>
  <script>
    (function () {
      // window.LVCI was populated from the query string in <head> (before the
      // deferred header ran). Use it to title the tab and point the iframe at
      // the validated, first-party report path.
      var cfg = window.LVCI || {};
      document.title = cfg.framedTitle || 'CI Report';
      var frame = document.getElementById('frame');
      var err = document.getElementById('err');
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function (ch) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch]; });
      }
      function dashboardRoot() {
        return location.pathname.indexOf('/report/') >= 0
          ? location.pathname.replace(/report\/[^/]*$/, '')
          : location.pathname.replace(/[^/]*$/, '');
      }
      function capForType(type) {
        return ({
          'masscompile-report': 'masscompile',
          'vi-analyzer-report': 'vi-analyzer',
          'unit-tests-report': 'unit-tests',
          'antidoc-report': 'antidoc'
        })[type] || '';
      }
      function populateHistoryUrl() {
        var cap = capForType(cfg.context);
        var url = dashboardRoot() + '?lvci-populate=1';
        if (cap) url += '&cap=' + encodeURIComponent(cap);
        if (cfg.sha) url += '&sha=' + encodeURIComponent(cfg.sha);
        if (cfg.platform) url += '&platform=' + encodeURIComponent(cfg.platform);
        return url;
      }
      function showMissingReport() {
        frame.removeAttribute('src');
        frame.hidden = true;
        err.hidden = false;
        err.innerHTML = '<h1>Report document not found</h1>'
          + '<p>This revision does not have a published <strong>' + escapeHtml(cfg.framedTitle || 'CI report') + '</strong> document yet. Populate history to generate missing report documents for older revisions.</p>'
          + '<a class="btn" href="' + escapeHtml(populateHistoryUrl()) + '">Populate history</a>'
          + '<a class="link" target="_blank" rel="noopener" href="' + escapeHtml(cfg.framedSrc || '') + '">Open raw URL</a>';
      }
      if (cfg.framedSrc) {
        fetch(cfg.framedSrc, { method: 'HEAD', cache: 'no-store' })
          .then(function (response) { if (!response.ok) throw new Error(String(response.status)); frame.src = cfg.framedSrc; })
          .catch(showMissingReport);
      } else {
        frame.hidden = true;
        err.hidden = false;
      }
      // The report's deep link is already this page's URL (type/sha/src/… are all
      // in the query string), so the header's Share button shares location.href as
      // is. For printing, target the embedded report directly — it is same-origin
      // (this Pages site) — so a printout is the report itself, not the chrome.
      window.__lvciPrint = function () {
        try {
          if (frame && !frame.hidden && frame.contentWindow) {
            frame.contentWindow.focus();
            frame.contentWindow.print();
            return;
          }
        } catch (e) { /* fall through to printing the whole page */ }
        try { window.print(); } catch (e) {}
      };
    })();
  </script>
</body>
</html>
